<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento Profissional | Móveis Simonetti</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

    <nav class="navbar">
        <div class="nav-left">
            <a href="inicial.html" class="btn-voltar">⬅ VOLTAR</a>
            <span id="user-display">DBRITO</span>
        </div>
        <div class="logo">MÓVEIS <span>SIMONETTI</span></div>
        <div class="nav-right">
            <button class="btn-sair" onclick="location.href='index.html'">SAIR</button>
        </div>
    </nav>

    <main class="container">
        <div class="dashboard-grid">
            <section class="card-form">
                <div class="card-header">
                    <h3>📅 Dados do Agendamento</h3>
                    <span id="badge-status" class="badge">NOVO</span>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Senha</label>
                        <input type="text" id="senhaAgendamento" readonly class="input-readonly">
                    </div>
                    <div class="form-group">
                        <label>Data</label>
                        <input type="date" id="dataCarga">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Central</label>
                        <select id="central">
                            <option value="PINHEIROS">PINHEIROS</option>
                            <option value="SERRA">SERRA</option>
                            <option value="BUERAREMA">BUERAREMA</option>
                            <option value="CONQUISTA">CONQUISTA</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Fornecedor <button class="btn-mini" onclick="abrirModalFornecedor()">GERENCIAR</button></label>
                        <select id="fornecedorSelect"></select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Cargas (Campo Livre)</label>
                    <input type="text" id="cargaTransporte" placeholder="Ex: Placa, Carreta, etc.">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Pedido / OC</label>
                        <input type="text" id="pedidoCompra">
                    </div>
                    <div class="form-group">
                        <label>Tipo de Produto</label>
                        <input type="text" id="tipoProduto" placeholder="Ex: ROUPEIRO, CELULAR..." onkeyup="this.value = this.value.toUpperCase()">
                    </div>
                </div>
            </section>

            <section class="card-form">
                <h3>📦 Composição da Carga</h3>
                <div id="listaItens" class="lista-itens-scroll"></div>
                <button class="btn-add" onclick="addLinhaItem()">+ ITEM</button>
                
                <div class="acoes-container">
                    <button class="btn-rascunho" id="btnRascunho">SALVAR RASCUNHO</button>
                    <button class="btn-save-all" id="btnFinalizar">AGENDAR DEFINITIVO</button>
                </div>
            </section>
        </div>

        <section class="area-tabela">
            <div class="filtros-bar">
                <input type="date" id="filtroInicio">
                <input type="date" id="filtroFim">
                <input type="text" id="buscaGeral" placeholder="🔍 Buscar por fornecedor, carga ou senha...">
                <button class="btn-excel" onclick="exportarExcel()">EXCEL</button>
            </div>

            <table id="tabelaAgendas">
                <thead>
                    <tr>
                        <th>SENHA</th>
                        <th>DATA</th>
                        <th>CENTRAL</th>
                        <th>FORNECEDOR</th>
                        <th>CARGA</th>
                        <th>TIPO PRODUTO</th>
                        <th>AÇÕES</th>
                    </tr>
                </thead>
                <tbody id="corpoTabela"></tbody>
            </table>
        </section>
    </main>

    <div id="modalFornecedor" class="modal">
        <div class="modal-content">
            <h3>Gerenciar Fornecedores</h3>
            <div class="modal-input-group">
                <input type="text" id="novoFornecedor" placeholder="Nome do fornecedor">
                <button onclick="salvarFornecedor()">ADICIONAR</button>
            </div>
            <ul id="listaFornecedores" class="modal-list"></ul>
            <button class="btn-fechar" onclick="fecharModais()">FECHAR</button>
        </div>
    </div>

    <div id="modalComp" class="modal">
        <div class="modal-content wide">
            <h3 id="tituloComp">Composição da Carga</h3>
            <table class="table-modal">
                <thead><tr><th>Cód</th><th>Descrição</th><th>Qtd</th></tr></thead>
                <tbody id="corpoComp"></tbody>
            </table>
            <button class="btn-fechar" onclick="fecharModais()">FECHAR</button>
        </div>
    </div>

    <script type="module" src="js/agendamento.js"></script>
</body>
</html>
