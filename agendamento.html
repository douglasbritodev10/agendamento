<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamentos | Móveis Simonetti</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        /* Layout da Navbar solicitado */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background: #D32F2F; color: white; }
        .user-section { display: flex; align-items: center; gap: 15px; }
        .btn-voltar { background: rgba(255,255,255,0.2); color: white; text-decoration: none; padding: 5px 10px; border-radius: 4px; font-size: 0.8rem; }
        .title-central { position: absolute; left: 50%; transform: translateX(-50%); font-weight: bold; text-transform: uppercase; }
        
        /* Containers */
        .main-content { padding: 20px; max-width: 1200px; margin: auto; }
        .area-agendar { background: white; padding: 20px; border-radius: 12px; margin-bottom: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .grid-campos { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        
        /* Tabela e Filtros */
        .area-tabela { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .filtros-tabela { display: flex; gap: 10px; margin-bottom: 15px; align-items: center; }
        #buscaCarga { flex-grow: 1; padding: 10px; border: 1px solid #ddd; border-radius: 6px; }
        
        .item-row { display: grid; grid-template-columns: 100px 1fr 100px 50px; gap: 10px; margin-bottom: 5px; }
        .ocultar-adm { display: none; } /* Para esconder botões de quem não é ADM */
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="user-section">
            <a href="inicial.html" class="btn-voltar">⬅ VOLTAR</a>
            <span id="labelUsuario">Usuário: ...</span>
        </div>
        
        <div class="title-central">Gestão de Agendamentos</div>

        <button onclick="logout()" style="background:none; border:1px solid white; color:white; padding:5px 15px; border-radius:4px; cursor:pointer;">SAIR</button>
    </nav>

    <main class="main-content">
        
        <section id="secaoCadastro" class="area-agendar ocultar-adm">
            <h3 style="color: #D32F2F; margin-top:0;">📅 Novo Agendamento</h3>
            <div class="grid-campos">
                <div class="form-group">
                    <label>Senha</label>
                    <input type="text" id="senhaAgendamento" readonly style="background: #f0f0f0;">
                </div>
                <div class="form-group">
                    <label>Data</label>
                    <input type="date" id="dataCarga">
                </div>
                <div class="form-group">
                    <label>Fornecedor</label>
                    <input type="text" id="fornecedor" placeholder="Nome do Fornecedor">
                </div>
                <div class="form-group">
                    <label>Transporte</label>
                    <input type="text" id="transporte" placeholder="Placa ou Transportadora">
                </div>
            </div>

            <h4 style="margin: 20px 0 10px 0;">📦 Composição da Carga</h4>
            <div id="listaItens">
                </div>
            <button type="button" onclick="addLinhaItem()" style="background:#212121; margin-top:10px;">+ ADICIONAR PRODUTO</button>
            <hr>
            <button class="btn-save-all" id="btnFinalizar" style="width:100%; padding:15px;">SALVAR AGENDAMENTO COMPLETO</button>
        </section>

        <section class="area-tabela">
            <div class="filtros-tabela">
                <input type="text" id="buscaCarga" placeholder="🔍 Buscar por senha, fornecedor ou produto...">
                <button onclick="exportarPDF()" style="background:#444;">🖨️ PDF</button>
            </div>

            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Senha</th>
                            <th>Data</th>
                            <th>Fornecedor</th>
                            <th>Transporte</th>
                            <th>Composição</th>
                            <th class="ocultar-adm">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="corpoTabelaAgendamentos">
                        </tbody>
                </table>
            </div>
        </section>
    </main>

    <script type="module" src="js/agendamento.js"></script>
    <script>
        function addLinhaItem() {
            const container = document.getElementById('listaItens');
            const div = document.createElement('div');
            div.className = 'item-row';
            div.innerHTML = `
                <input type="text" class="prod-id" placeholder="Cód">
                <input type="text" class="prod-desc" placeholder="Descrição">
                <input type="number" class="prod-qtd" placeholder="Qtd">
                <button type="button" onclick="this.parentElement.remove()" style="background:red; padding:5px;">X</button>
            `;
            container.appendChild(div);
        }
        window.logout = () => { localStorage.clear(); window.location.href="index.html"; };
    </script>
</body>
</html>
