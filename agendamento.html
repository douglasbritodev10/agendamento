<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Agendamento | Móveis Simonetti</title>
    <link rel="stylesheet" href="css/styles.css">
    
    <style>
        /* Ajustes específicos para a grade de agendamento */
        .grid-main { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .item-header { 
            display: grid; 
            grid-template-columns: 120px 1fr 100px 40px; 
            gap: 10px; 
            font-weight: bold; 
            font-size: 0.7rem; 
            color: #666;
            margin-bottom: 10px;
        }
        .item-row { 
            display: grid; 
            grid-template-columns: 120px 1fr 100px 40px; 
            gap: 10px; 
            margin-bottom: 8px; 
        }
        .btn-del { background: #ff5252; color: white; border: none; border-radius: 4px; cursor: pointer; }
        
        @media (max-width: 768px) {
            .grid-main { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-left" style="display: flex; align-items: center; gap: 15px;">
            <a href="inicial.html" class="btn-back" style="text-decoration: none; color: white; font-size: 1.2rem;">⬅</a>
            <div id="userInfo" style="font-size: 0.8rem; border-left: 1px solid rgba(255,255,255,0.3); padding-left: 15px;">
                👤 <span id="navUserName">Carregando...</span>
            </div>
        </div>
        
        <div class="logo">MÓVEIS <span>SIMONETTI</span></div>
        
        <div class="nav-right">
            <button onclick="logout()" class="btn-sair">SAIR ⏻</button>
        </div>
    </nav>

    <main class="container">
        <div id="areaAgendamento" style="display:none;">
            <div class="grid-main">
                <section class="card-form">
                    <h3 style="color: #D32F2F; margin-bottom: 20px; border-bottom: 2px solid #f5f5f5; padding-bottom: 10px;">📋 Dados do Transporte</h3>
                    
                    <div class="form-group">
                        <label>Senha do Agendamento</label>
                        <input type="text" id="senhaAgendamento" readonly style="background: #eee; font-weight: bold; color: #333;">
                    </div>

                    <div class="form-group">
                        <label>Linkar com Senha (Fracionado)</label>
                        <input type="text" id="linkSenha" placeholder="Ex: SIM-202405-1234">
                    </div>

                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                        <div class="form-group">
                            <label>Data</label>
                            <input type="date" id="dataCarga">
                        </div>
                        <div class="form-group">
                            <label>Central</label>
                            <select id="central">
                                <option value="CD-COLATINA">CD COLATINA</option>
                                <option value="CD-VIANA">CD VIANA</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Fornecedor</label>
                        <input type="text" id="fornecedor" placeholder="Nome da empresa">
                    </div>

                    <div class="form-group">
                        <label>Transportadora / Placa</label>
                        <input type="text" id="transporte" placeholder="Identificação do veículo">
                    </div>
                </section>

                <section class="card-form">
                    <h3 style="color: #D32F2F; margin-bottom: 20px; border-bottom: 2px solid #f5f5f5; padding-bottom: 10px;">📦 Conteúdo da Carga</h3>
                    
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                        <div class="form-group">
                            <label>Ordem de Compra</label>
                            <input type="text" id="ordemCompra" placeholder="Nº da OC">
                        </div>
                        <div class="form-group">
                            <label>Volumes</label>
                            <input type="number" id="volumes" placeholder="0">
                        </div>
                    </div>

                    <div class="item-header">
                        <div>CÓDIGO</div><div>DESCRIÇÃO</div><div>QTD</div><div></div>
                    </div>
                    
                    <div id="listaItens">
                        </div>
                    
                    <button type="button" onclick="addLinhaItem()" style="width: 100%; margin-top: 10px; background: #666; color: white; padding: 10px; border: none; border-radius: 5px; cursor: pointer;">+ ADICIONAR PRODUTO</button>
                </section>
            </div>

            <button class="btn-save-all" id="btnFinalizar" style="margin-top: 20px; width: 100%; padding: 20px; font-size: 1.1rem; background: #D32F2F; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">FINALIZAR E SALVAR AGENDAMENTO</button>
        </div>

        <div id="erroAcesso" style="display:none; text-align: center; padding: 50px;">
            <h2>Acesso Negado</h2>
            <p>Seu usuário não tem permissão para realizar agendamentos.</p>
        </div>
    </main>

    <script>
        function logout() { localStorage.clear(); window.location.href = "index.html"; }
        
        function addLinhaItem() {
            const container = document.getElementById('listaItens');
            const div = document.createElement('div');
            div.className = 'item-row';
            div.innerHTML = `
                <input type="text" class="prod-id" placeholder="Cód">
                <input type="text" class="prod-desc" placeholder="Ex: Roupeiro">
                <input type="number" class="prod-qtd" placeholder="0">
                <button type="button" class="btn-del" onclick="this.parentElement.remove()">X</button>
            `;
            container.appendChild(div);
        }
    </script>

    <script type="module" src="js/agendamento.js"></script>
</body>
</html>
