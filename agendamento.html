<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Agendamentos | Móveis Simonetti</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="logo">MÓVEIS <span>SIMONETTI</span></div>
        <div class="nav-links">
            <a href="inicial.html">⬅ VOLTAR</a>
        </div>
    </nav>

    <main class="container">
        <section id="areaCadastro" class="card-form" style="display:none; margin-bottom: 30px;">
            <h2 style="color: var(--vermelho); margin-bottom: 20px;">📝 Novo Agendamento</h2>
            <div class="grid-form">
                <div class="form-group">
                    <label>Senha</label>
                    <input type="text" id="senhaAgendamento" readonly>
                </div>
                <div class="form-group">
                    <label>Data</label>
                    <input type="date" id="dataCarga">
                </div>
                <div class="form-group">
                    <label>Central</label>
                    <select id="central">
                        <option value="CD-01">CD-01 (Colatina)</option>
                        <option value="CD-02">CD-02 (Viana)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Fornecedor</label>
                    <input type="text" id="fornecedor" placeholder="Nome do Fornecedor">
                </div>
                <div class="form-group">
                    <label>Transporte/Placa</label>
                    <input type="text" id="transporte" placeholder="Placa ou Transportadora">
                </div>
                <div class="form-group">
                    <label>Linkar com Senha (Fracionada)</label>
                    <input type="text" id="linkSenha" placeholder="Senha da carga principal (Opcional)">
                </div>
            </div>
            <button class="btn-save-all" id="btnFinalizar">SALVAR AGENDAMENTO</button>
        </section>

        <section class="card-form" style="margin-bottom: 20px;">
            <div style="display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end;">
                <div style="flex: 1; min-width: 200px;">
                    <label>Período</label>
                    <div style="display: flex; gap: 5px;">
                        <input type="date" id="filtroDataInicio">
                        <input type="date" id="filtroDataFim">
                    </div>
                </div>
                <button class="btn-primary" id="btnFiltrar">🔍 FILTRAR</button>
                <button class="btn-primary" onclick="exportarExcel()" style="background:#2e7d32">📗 EXCEL</button>
                <button class="btn-primary" onclick="exportarPDF()" style="background:#c62828">📕 PDF</button>
            </div>
        </section>

        <div class="tabela-container" style="overflow-x: auto;">
            <table id="tabelaAgendamentos">
                <thead>
                    <tr>
                        <th><input type="checkbox" id="selectAll"></th>
                        <th>Senha</th>
                        <th>Data</th>
                        <th>Central</th>
                        <th>Fornecedor</th>
                        <th>Transporte</th>
                        <th>Volumes</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="corpoAgendamentos"></tbody>
            </table>
        </div>
    </main>

    <script type="module" src="js/agendamento.js"></script>
</body>
</html>
