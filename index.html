<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Móveis Simonetti</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        /* Estilo específico para o Login (Glassmorphism) */
        body {
            background: linear-gradient(135deg, #D32F2F 0%, #212121 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 2.5rem;
            border-radius: 15px;
            width: 100%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.37);
        }
        .login-card h2 { color: white; margin-bottom: 1.5rem; font-weight: 300; }
        .login-card input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            background: rgba(255, 255, 255, 0.9);
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background: #D32F2F;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
        }
        .btn-login:hover { background: #b71c1c; transform: scale(1.02); }
        .logo-simonetti { color: white; font-weight: bold; font-size: 1.5rem; margin-bottom: 20px; }
        .logo-simonetti span { color: #D32F2F; background: white; padding: 2px 8px; border-radius: 4px; margin-left: 5px; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-simonetti">MÓVEIS<span>SIMONETTI</span></div>
        <h2>Acesso ao Sistema</h2>
        <input type="email" id="email" placeholder="E-mail" required>
        <input type="password" id="password" placeholder="Senha" required>
        <button class="btn-login" id="btnLogin">ENTRAR</button>
        <p style="color: white; font-size: 0.8rem; margin-top: 15px; cursor: pointer;" onclick="alert('Procure o ADM para cadastrar seu acesso.')">Primeiro acesso?</p>
    </div>

    <script type="module" src="js/auth.js"></script>
</body>
</html>
