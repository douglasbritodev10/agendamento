<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monitoramento de Cargas | Móveis Simonetti</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root {
            --primary: #C80000;
            --primary-dark: #960000;
            --warning: #ffeb3b;
            --glass: rgba(255, 255, 255, 0.9);
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            color: #333;
        }

        /* Topo Premium com Sair */
        .header-portal {
            background-color: var(--primary);
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            position: sticky; top: 0; z-index: 1000;
        }

        .user-box { display: flex; align-items: center; gap: 15px; }
        .btn-sair { 
            background: rgba(0,0,0,0.2); color: white; border: none; 
            padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold;
        }

        .main-container { padding: 15px; }

        /* Estilo das Linhas por Tipo */
        .tipo-eletro { border-left: 6px solid #2196F3 !important; }
        .tipo-moveis { border-left: 6px solid #4CAF50 !important; }
        .tipo-outros { border-left: 6px solid #9c27b0 !important; }

        /* Indicador de Filtro Aplicado */
        .badge-filtro {
            display: none; background: var(--warning); color: #000;
            font-size: 9px; padding: 2px 4px; border-radius: 3px;
            margin-top: 5px; text-transform: uppercase;
        }
        th.filtrado .badge-filtro { display: inline-block; }

        /* Tabela Estilo Excel */
        .table-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        thead th { background-color: var(--primary); color: white; padding: 12px 5px; font-size: 11px; border: 1px solid var(--primary-dark); }

        /* Modais */
        .modal-filtro, .modal-detalhe {
            display: none; position: fixed; z-index: 2000; left: 0; top: 0; 
            width: 100%; height: 100%; background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px); justify-content: center; align-items: center;
        }

        /* Efeito Vidro para Composição */
        .glass-modal {
            background: var(--glass); width: 90%; max-width: 600px;
            border-radius: 20px; padding: 20px; border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 25px 50px rgba(0,0,0,0.2); animation: slideIn 0.3s ease;
        }

        .modal-content { background: white; width: 320px; border-radius: 15px; overflow: hidden; }

        .btn-acao-modal { flex: 1; padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-check-toggle { background: #eee; font-size: 10px; padding: 5px; margin-bottom: 10px; width: 100%; border: 1px solid #ddd; border-radius: 4px; }

        @keyframes slideIn { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* Mobile */
        @media (max-width: 768px) {
            .dashboard-controls { flex-direction: column; align-items: stretch; }
            .search-wrapper { width: 100% !important; }
            .export-section { overflow-x: auto; padding-bottom: 10px; }
        }
    </style>
</head>
<body>

    <header class="header-portal">
        <div class="user-box">
            <i class="fas fa-arrow-left" onclick="window.history.back()"></i>
            <span>Olá, <b id="user-display">---</b></span>
        </div>
        <div style="text-align: center;">
            <span style="font-size: 14px; font-weight: bold;">MONITORAMENTO</span><br>
            <span class="count-badge" style="background:white; color:var(--primary); padding:2px 10px; border-radius:10px; font-size:12px;">TOTAL: <span id="txtContador">0</span></span>
        </div>
        <button class="btn-sair" onclick="location.href='index.html'">SAIR <i class="fas fa-sign-out-alt"></i></button>
    </header>

    <div class="main-container">
        <div class="dashboard-controls">
            <div class="export-section">
                <h4>Exportações Disponíveis</h4>
                <div class="btn-group">
                    <button class="btn-exp btn-pdf" onclick="exportarPDF('basico')"><i class="fas fa-file-pdf"></i> PDF BÁSICO</button>
                    <button class="btn-exp btn-pdf" onclick="exportarPDF('completo')"><i class="fas fa-file-pdf"></i> PDF COMPLETO</button>
                    <button class="btn-exp btn-excel" onclick="exportarExcel('basico')"><i class="fas fa-file-excel"></i> EXCEL BÁSICO</button>
                    <button class="btn-exp btn-excel" onclick="exportarExcel('completo')"><i class="fas fa-file-excel"></i> EXCEL COMPLETO</button>
                </div>
            </div>

            <div class="search-wrapper" style="width: 400px;">
                <label>BUSCA GLOBAL (INCLUI ITENS)</label>
                <input type="text" id="inputBuscaGlobal" oninput="aplicarLogicaDeFiltros()" placeholder="Senha, Fornecedor, Produto...">
            </div>
        </div>

        <div class="table-card">
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th width="40"><i class="fas fa-check-square"></i></th>
                            <th id="th-senhaAgendamento">SENHA <br><button class="btn-col-filter" onclick="abrirFiltroColuna('senhaAgendamento')">FILTRAR</button><br><span class="badge-filtro">APLICADO</span></th>
                            <th id="th-data">DATA <br><button class="btn-col-filter" onclick="abrirFiltroColuna('data')">FILTRAR</button><br><span class="badge-filtro">APLICADO</span></th>
                            <th id="th-central">CENTRAL <br><button class="btn-col-filter" onclick="abrirFiltroColuna('central')">FILTRAR</button><br><span class="badge-filtro">APLICADO</span></th>
                            <th id="th-cargas">CARGAS <br><button class="btn-col-filter" onclick="abrirFiltroColuna('cargas')">FILTRAR</button><br><span class="badge-filtro">APLICADO</span></th>
                            <th id="th-fornecedor">FORNECEDOR <br><button class="btn-col-filter" onclick="abrirFiltroColuna('fornecedor')">FILTRAR</button><br><span class="badge-filtro">APLICADO</span></th>
                            <th id="th-tipoProduto">TIPO <br><button class="btn-col-filter" onclick="abrirFiltroColuna('tipoProduto')">FILTRAR</button><br><span class="badge-filtro">APLICADO</span></th>
                            <th>AÇÕES</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaCorpo"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="modalFiltro" class="modal-filtro">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="tituloFiltro" style="margin:0; font-size: 14px;">FILTRAR</h3>
                <span onclick="fecharModal()" style="cursor:pointer">&times;</span>
            </div>
            <div style="padding: 10px;">
                <button class="btn-check-toggle" onclick="toggleTodosFiltros(true)">MARCAR TODOS</button>
                <button class="btn-check-toggle" onclick="toggleTodosFiltros(false)">DESMARCAR TODOS</button>
            </div>
            <div class="opcoes-lista" id="listaOpcoes"></div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="fecharModal()">CANCELAR</button>
                <button class="btn-apply" onclick="executarFiltro()">APLICAR</button>
            </div>
        </div>
    </div>

    <div id="modalComposicao" class="modal-detalhe">
        <div class="glass-modal">
            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ccc; padding-bottom: 10px; margin-bottom: 15px;">
                <h2 style="margin:0; color:var(--primary); font-size: 18px;"><i class="fas fa-boxes"></i> Composição da Carga</h2>
                <i class="fas fa-times" onclick="fecharModalComposicao()" style="cursor:pointer; font-size: 20px;"></i>
            </div>
            <div id="detalheItens" style="max-height: 400px; overflow-y: auto;"></div>
        </div>
    </div>

    <script type="module" src="js/monitoramento.js"></script>
</body>
</html>
