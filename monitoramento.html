<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Agendamento | Móveis Simonetti</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root {
            --primary: #C80000;
            --primary-dark: #960000;
            --glass: rgba(255, 255, 255, 0.9);
            --shadow: 0 4px 12px rgba(0,0,0,0.15);
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            color: #333;
        }

        /* HEADER REESTRUTURADO */
        .header-portal {
            background: #fff;
            color: #333;
            padding: 10px 20px;
            display: grid;
            grid-template-columns: 1fr auto 1fr; /* Esquerda, Centro, Direita */
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: sticky; top: 0; z-index: 1000;
        }

        .header-left { display: flex; align-items: center; gap: 15px; }
        .header-center { text-align: center; }
        .header-right { text-align: right; }

        .btn-back { font-size: 1.2rem; cursor: pointer; color: #666; }
        .btn-logout { background: var(--primary); border: none; color: white; padding: 8px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        
        .titulo-sistema { color: var(--primary); font-weight: bold; font-size: 1.4rem; margin: 0; }

        /* CONTAINER PRINCIPAL */
        .main-container { padding: 20px; max-width: 100%; margin: auto; }

        .control-panel {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .export-group {
            background: white;
            padding: 10px;
            border-radius: 10px;
            box-shadow: var(--shadow);
            display: flex;
            gap: 8px;
        }

        .btn-export {
            border: 1px solid #ddd;
            padding: 8px 12px;
            border-radius: 6px;
            background: white;
            cursor: pointer;
            font-weight: bold;
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: 0.2s;
        }
        .btn-export:hover { border-color: var(--primary); color: var(--primary); }

        /* TABELA E PAGINAÇÃO */
        .table-container { background: white; border-radius: 10px; box-shadow: var(--shadow); overflow: hidden; }
        .scroll-area { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        
        thead th {
            background: var(--primary);
            color: white;
            padding: 15px 10px;
            font-size: 12px;
            text-transform: uppercase;
            cursor: pointer;
            position: relative;
        }
        
        th.sortable:hover { background: var(--primary-dark); }
        th i { margin-left: 5px; opacity: 0.7; }

        tbody td { padding: 12px 10px; text-align: center; border-bottom: 1px solid #eee; font-size: 13px; }

        /* PAGINAÇÃO */
        .pagination {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: #f9f9f9;
            border-top: 1px solid #eee;
        }
        .page-buttons { display: flex; gap: 5px; }
        .btn-page { padding: 5px 10px; border: 1px solid #ddd; background: white; cursor: pointer; border-radius: 4px; }
        .btn-page.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* MODAIS */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .modal-glass {
            background: white;
            width: 100%;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        /* Tamanho Grande no PC */
        @media (min-width: 1024px) { .modal-glass { max-width: 80%; } }

        .modal-header { background: var(--primary); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 20px; max-height: 75vh; overflow-y: auto; overflow-x: auto; }

        .btn-filter-trigger {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            cursor: pointer;
            display: block;
            margin: 5px auto 0;
            width: 100%;
        }

        /* Cores da Móveis Simonetti por tipo */
        .row-eletro { border-left: 5px solid #2196F3; }
        .row-moveis { border-left: 5px solid #4CAF50; }
    </style>
</head>
<body>

    <header class="header-portal">
        <div class="header-left">
            <i class="fas fa-arrow-left btn-back" onclick="window.history.back()"></i>
            <span style="font-size: 14px; font-weight: bold;">Bem-vindo, <span id="txtUser">USUÁRIO</span></span>
        </div>
        <div class="header-center">
            <h1 class="titulo-sistema">AGENDAMENTO - MÓVEIS SIMONETTI</h1>
        </div>
        <div class="header-right">
            <button class="btn-logout" onclick="window.location.href='index.html'">Sair</button>
        </div>
    </header>

    <div class="main-container">
        
        <div class="control-panel">
            <div class="export-group">
                <button class="btn-export" style="color:#e74c3c" onclick="exportar('pdf', 'basico')"><i class="fas fa-file-pdf"></i> PDF Básico</button>
                <button class="btn-export" style="color:#e74c3c" onclick="exportar('pdf', 'completo')"><i class="fas fa-file-pdf"></i> PDF Detalhado</button>
                <button class="btn-export" style="color:#27ae60" onclick="exportar('excel', 'basico')"><i class="fas fa-file-excel"></i> Excel Básico</button>
                <button class="btn-export" style="color:#27ae60" onclick="exportar('excel', 'completo')"><i class="fas fa-file-excel"></i> Excel Detalhado</button>
            </div>

            <div style="display: flex; gap: 10px; align-items: flex-end;">
                <div>
                    <label style="font-size: 11px; font-weight: bold; color: #666;">EXIBIR</label><br>
                    <select id="selectPageSize" onchange="mudarTamanhoPagina()" style="padding: 10px; border-radius: 6px; border: 1px solid #ccc;">
                        <option value="25">25</option>
                        <option value="50" selected>50</option>
                        <option value="75">75</option>
                        <option value="100">100</option>
                    </select>
                </div>
                <div style="width: 250px;">
                    <label style="font-size: 11px; font-weight: bold; color: #666;">PESQUISAR</label>
                    <input type="text" id="inputBusca" placeholder="Buscar registros..." 
                           style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ccc; outline: none;"
                           oninput="atualizarFiltros()">
                </div>
            </div>
        </div>

        <div class="table-container">
            <div class="scroll-area">
                <table id="tabelaDados">
                    <thead>
                        <tr>
                            <th width="40"><input type="checkbox" id="checkAll" onclick="marcarTodos(this)"></th>
                            <th class="sortable" onclick="ordenar('senhaAgendamento')">Senha <i class="fas fa-sort"></i> <button class="btn-filter-trigger" onclick="event.stopPropagation(); abrirModalFiltro('senhaAgendamento')">FILTRAR</button></th>
                            <th class="sortable" onclick="ordenar('data')">Data <i class="fas fa-sort"></i> <button class="btn-filter-trigger" onclick="event.stopPropagation(); abrirModalFiltro('data')">FILTRAR</button></th>
                            <th class="sortable" onclick="ordenar('central')">Central <i class="fas fa-sort"></i> <button class="btn-filter-trigger" onclick="event.stopPropagation(); abrirModalFiltro('central')">FILTRAR</button></th>
                            <th>Cargas <button class="btn-filter-trigger" onclick="abrirModalFiltro('cargas')">FILTRAR</button></th>
                            <th class="sortable" onclick="ordenar('fornecedor')">Fornecedor <i class="fas fa-sort"></i> <button class="btn-filter-trigger" onclick="event.stopPropagation(); abrirModalFiltro('fornecedor')">FILTRAR</button></th>
                            <th>Tipo <button class="btn-filter-trigger" onclick="abrirModalFiltro('tipoProduto')">FILTRAR</button></th>
                            <th>Ver</th>
                        </tr>
                    </thead>
                    <tbody id="corpoTabela"></tbody>
                </table>
            </div>

            <div class="pagination">
                <div id="infoPagina" style="font-size: 13px; color: #666;"></div>
                <div class="page-buttons" id="botoesPagina"></div>
            </div>
        </div>
    </div>

    <div id="modalFiltro" class="modal-overlay">
        <div class="modal-glass" style="max-width: 400px;">
            <div class="modal-header">
                <span id="tituloFiltro">FILTRAR COLUNA</span>
                <i class="fas fa-times" onclick="fecharModais()" style="cursor:pointer"></i>
            </div>
            <div class="modal-body" id="opcoesFiltro"></div>
            <div style="padding: 15px; display: flex; gap: 10px;">
                <button onclick="aplicarFiltroColuna()" style="flex:1; background: var(--primary); color:white; border:none; padding:10px; border-radius:5px; font-weight:bold; cursor:pointer;">APLICAR</button>
                <button onclick="fecharModais()" style="flex:1; background: #eee; border:none; padding:10px; border-radius:5px; cursor:pointer;">CANCELAR</button>
            </div>
        </div>
    </div>

    <div id="modalComposicao" class="modal-overlay">
        <div class="modal-glass">
            <div class="modal-header">
                <span id="tituloComp">ITENS DA CARGA</span>
                <i class="fas fa-times" onclick="fecharModais()" style="cursor:pointer"></i>
            </div>
            <div class="modal-body">
                <div id="detalhesItens"></div>
            </div>
        </div>
    </div>

    <script type="module" src="js/monitoramento.js"></script>
</body>
</html>
