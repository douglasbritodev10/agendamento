<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoramento de Cargas | Móveis Simonetti</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css"> <style>
        /* Estilos específicos para o topo e filtros individuais */
        .header-portal { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background: #eee; border-bottom: 2px solid #D32F2F; }
        .titulo-central { text-align: center; color: #D32F2F; margin: 20px 0; }
        .controles-superiores { display: flex; justify-content: space-between; align-items: flex-end; padding: 0 20px; margin-bottom: 10px; flex-wrap: wrap; gap: 10px; }
        .export-group .btn-export { background: #D32F2F; color: white; border: none; padding: 8px 12px; cursor: pointer; border-radius: 4px; margin-right: 5px; font-size: 12px; }
        .search-container { position: relative; }
        .search-container input { padding: 8px 30px 8px 10px; border: 1px solid #ccc; border-radius: 4px; width: 250px; }
        
        /* Tabela igual à imagem */
        .table-wrapper { padding: 0 20px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 1100px; }
        thead th { background: #D32F2F; color: white; padding: 8px; font-size: 11px; border: 1px solid #b71c1c; }
        .btn-filtro-topo { display: block; width: 100%; margin-top: 5px; background: white; border: none; color: #D32F2F; font-weight: bold; cursor: pointer; padding: 4px; border-radius: 3px; font-size: 10px; }
        
        /* Modal de Composição */
        #modalComposicao .modal-body { max-height: 400px; overflow-y: auto; }
        .card-item { border-left: 4px solid #D32F2F; background: #f9f9f9; padding: 10px; margin-bottom: 8px; border-radius: 4px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

    <header class="header-portal">
        <div class="user-info">
            <i class="fas fa-arrow-left" onclick="history.back()" style="cursor:pointer; margin-right:15px;"></i>
            <span>Bem-vindo, <b id="user-display">---</b></span>
        </div>
        <button class="btn-sair" onclick="location.href='index.html'">Sair</button>
    </header>

    <h1 class="titulo-central">MONITORAMENTO DE CARGAS - MÓVEIS SIMONETTI</h1>

    <div class="controles-superiores">
        <div class="export-group">
            <button class="btn-export" onclick="exportar('excel')"><i class="fas fa-file-excel"></i> Excel</button>
            <button class="btn-export" onclick="exportar('pdf-basico')">PDF Básico</button>
            <button class="btn-export" onclick="exportar('pdf-completo')">PDF Completo</button>
            <button class="btn-export" onclick="exportar('csv')">CSV</button>
        </div>

        <div style="display: flex; gap: 15px; align-items: center;">
            <div>
                <label style="font-size: 12px; display: block; font-weight: bold;">Filtrar Data:</label>
                <input type="date" id="filtroDataGlobal" onchange="alterarDataFiltro()">
            </div>
            <div class="search-container">
                <label style="font-size: 12px; display: block; font-weight: bold;">Pesquisar:</label>
                <input type="text" id="inputBuscaGlobal" placeholder="Buscar em qualquer campo..." oninput="filtrarGeral()">
            </div>
        </div>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>SENHA <button class="btn-filtro-topo" onclick="abrirFiltroColuna('senhaAgendamento')">Filtrar</button></th>
                    <th>DATA <button class="btn-filtro-topo" onclick="abrirFiltroColuna('data')">Filtrar</button></th>
                    <th>CENTRAL <button class="btn-filtro-topo" onclick="abrirFiltroColuna('central')">Filtrar</button></th>
                    <th>CARGAS <button class="btn-filtro-topo" onclick="abrirFiltroColuna('cargas')">Filtrar</button></th>
                    <th>FORNECEDOR <button class="btn-filtro-topo" onclick="abrirFiltroColuna('fornecedor')">Filtrar</button></th>
                    <th>TIPO <button class="btn-filtro-topo" onclick="abrirFiltroColuna('tipoProduto')">Filtrar</button></th>
                    <th>DETALHES</th>
                </tr>
            </thead>
            <tbody id="tabelaCorpo"></tbody>
        </table>
    </div>

    <div id="modalComposicao" class="modal-filtro">
        <div class="modal-content" style="width: 600px;">
            <div class="modal-header">
                <h3>COMPOSIÇÃO DA CARGA: <span id="spanSenhaCarga">---</span></h3>
                <span onclick="fecharModalComposicao()" style="cursor:pointer">&times;</span>
            </div>
            <div id="listaComposicao" class="modal-body" style="padding: 20px;">
                </div>
            <div class="modal-footer">
                <button class="btn-modal btn-aplicar" onclick="fecharModalComposicao()">FECHAR</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/monitoramento.js"></script>
</body>
</html>
