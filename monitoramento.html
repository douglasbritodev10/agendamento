<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Agendamento | Móveis Simonetti</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    
    <!-- Bibliotecas de Exportação -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>

    <style>
        :root {
            --primary: #D32F2F;
            --primary-dark: #B71C1C;
            --bg-light: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-muted: #666666;
            --border-color: #e0e0e0;
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-light);
            margin: 0;
            color: var(--text-main);
        }

        /* HEADER */
        .header-portal {
            background: #fff;
            padding: 10px 20px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: sticky; 
            top: 0; 
            z-index: 1000;
        }

        .header-left { display: flex; align-items: center; gap: 15px; }
        .header-center { text-align: center; }
        .header-right { text-align: right; }

        .btn-back { font-size: 1.2rem; cursor: pointer; color: #666; transition: 0.2s; }
        .btn-back:hover { color: var(--primary); }
        
        .btn-logout { 
            background: var(--primary); 
            border: none; 
            color: white; 
            padding: 8px 20px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-logout:hover { background: var(--primary-dark); }
        
        .titulo-sistema { color: var(--primary); font-weight: bold; font-size: 1.4rem; margin: 0; }

        /* CONTAINER PRINCIPAL */
        .main-container { padding: 20px; max-width: 100%; margin: auto; }

        /* PAINEL DE CONTROLE */
        .control-panel {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 20px;
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            gap: 15px;
            flex-wrap: wrap;
        }

        .left-controls {
            display: flex;
            gap: 20px;
            align-items: flex-end;
        }

        .control-group label {
            font-size: 11px;
            font-weight: bold;
            color: var(--text-muted);
            display: block;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .control-input {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: #fff;
            outline: none;
            font-size: 14px;
        }

        .control-input:focus { border-color: var(--primary); }

        /* DROPDOWN COMPARTILHAR */
        .dropdown { position: relative; }

        .btn-share {
            background: #1565c0;
            color: white;
            border: none;
            padding: 11px 20px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
            font-size: 13px;
        }

        .btn-share:hover { background: #0d47a1; box-shadow: 0 4px 8px rgba(21, 101, 192, 0.3); }

        .dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            background-color: white;
            min-width: 200px;
            box-shadow: 0px 8px 16px rgba(0,0,0,0.15);
            z-index: 1001;
            border-radius: 8px;
            margin-top: 8px;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .dropdown-content a {
            color: var(--text-main);
            padding: 12px 16px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            border-bottom: 1px solid #f0f0f0;
            transition: 0.2s;
        }

        .dropdown-content a:hover { background-color: #f8f9fa; color: var(--primary); }

        /* TABELA */
        .table-container { background: white; border-radius: 12px; box-shadow: var(--shadow); overflow: hidden; }
        .scroll-area { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        
        thead th {
            background: var(--primary);
            color: white;
            padding: 15px 10px;
            font-size: 12px;
            text-transform: uppercase;
            text-align: center;
            position: relative;
        }

        .th-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        
        tbody td { padding: 12px 10px; text-align: center; border-bottom: 1px solid #eee; font-size: 13px; }

        /* BADGE DE FILTRO ATIVO */
        .badge-filtro {
            background-color: #fff176;
            color: #333;
            font-size: 9px;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
            border: 1px solid #fbc02d;
            margin-top: 4px;
        }

        /* PAGINAÇÃO */
        .pagination {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: #fff;
            border-top: 1px solid #eee;
        }
        .page-buttons { display: flex; gap: 5px; }
        .btn-page { padding: 6px 12px; border: 1px solid #ddd; background: white; cursor: pointer; border-radius: 4px; font-size: 13px; }
        .btn-page.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* MODAIS */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal-glass {
            background: white;
            width: 90%;
            max-width: 500px; /* Reduzi para o filtro */
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        #modalComposicao .modal-glass { max-width: 800px; }

        .modal-header { background: var(--primary); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 20px; max-height: 70vh; overflow-y: auto; }

        .option-disabled { opacity: 0.5; color: #999; font-style: italic; }
    </style>
</head>
<body>

    <header class="header-portal">
        <div class="header-left">
            <i class="fas fa-arrow-left btn-back" onclick="window.history.back()"></i>
            <span style="font-size: 14px; font-weight: bold;">Olá, <span id="txtUser">USUÁRIO</span></span>
        </div>
        <div class="header-center">
            <h1 class="titulo-sistema">AGENDAMENTO - MÓVEIS SIMONETTI</h1>
        </div>
        <div class="header-right">
            <button class="btn-logout" onclick="window.location.href='index.html'">Sair</button>
        </div>
    </header>

    <div class="main-container">
        
        <div class="control-panel">
            <div class="left-controls">
                <div class="control-group">
                    <label>Exibir</label>
                    <select id="selectPageSize" onchange="mudarTamanhoPagina()" class="control-input">
                        <option value="25">25</option>
                        <option value="50" selected>50</option>
                        <option value="75">75</option>
                        <option value="100">100</option>
                    </select>
                </div>
                
                <div class="control-group" style="width: 300px;">
                    <label>Pesquisar Geral</label>
                    <input type="text" id="inputBusca" placeholder="Buscar por fornecedor, senha..." 
                           class="control-input" style="width: 100%;" oninput="atualizarFiltros()">
                </div>
            </div>

            <div class="dropdown">
                <button onclick="toggleDropdownExport()" class="btn-share" id="btnShare">
                    <i class="fas fa-share-alt"></i> COMPARTILHAR <i class="fas fa-caret-down"></i>
                </button>
                <div id="menuExport" class="dropdown-content">
                    <a href="#" onclick="exportarExcel('basico')">
                        <i class="fas fa-file-excel" style="color: #2e7d32;"></i> Excel Básico
                    </a>
                    <a href="#" onclick="exportarExcel('completo')">
                        <i class="fas fa-file-excel" style="color: #1b5e20;"></i> Excel Completo
                    </a>
                    <a href="#" onclick="exportarPDF('basico')">
                        <i class="fas fa-file-pdf" style="color: #1565c0;"></i> PDF Básico
                    </a>
                    <a href="#" onclick="exportarPDF('completo')">
                        <i class="fas fa-file-pdf" style="color: #d32f2f;"></i> PDF Completo
                    </a>
                </div>
            </div>
        </div>

        <div class="table-container">
            <div class="scroll-area">
                <table id="tabelaDados">
                    <thead>
                        <tr>
                            <th width="40"><input type="checkbox" id="checkAll" onclick="marcarTodos(this)"></th>
                            <th onclick="abrirModalFiltro('senhaAgendamento')" style="cursor:pointer">
                                <div class="th-content" id="th-senhaAgendamento"><span>Senha</span><i class="fas fa-filter"></i></div>
                            </th>
                            <th onclick="abrirModalFiltro('data')" style="cursor:pointer">
                                <div class="th-content" id="th-data"><span>Data</span><i class="fas fa-filter"></i></div>
                            </th>
                            <th onclick="abrirModalFiltro('central')" style="cursor:pointer">
                                <div class="th-content" id="th-central"><span>Central</span><i class="fas fa-filter"></i></div>
                            </th>
                            <th onclick="abrirModalFiltro('cargas')" style="cursor:pointer">
                                <div class="th-content" id="th-central"><span>Cargas</span><i class="fas fa-filter"></i></div>
                            </th>
                            <th onclick="abrirModalFiltro('fornecedor')" style="cursor:pointer">
                                <div class="th-content" id="th-fornecedor"><span>Fornecedor</span><i class="fas fa-filter"></i></div>
                            </th>
                            <th onclick="abrirModalFiltro('tipoProduto')" style="cursor:pointer">
                                <div class="th-content" id="th-tipoProduto"><span>Tipo</span><i class="fas fa-filter"></i></div>
                            </th>
                            <th onclick="abrirModalFiltro('linhaSeparacao')" style="cursor:pointer">
                                <div class="th-content" id="th-tipoProduto"><span>Linha</span><i class="fas fa-filter"></i></div>
                            </th>
                            <th>Ver</th>
                        </tr>
                    </thead>
                    <tbody id="corpoTabela"></tbody>
                </table>
            </div>

            <div class="pagination">
                <div id="infoPagina" style="font-size: 13px; color: #666;"></div>
                <div class="page-buttons" id="botoesPagina"></div>
            </div>
        </div>
    </div>

    <!-- MODAL FILTRO INTELIGENTE -->
    <div id="modalFiltro" class="modal-overlay">
        <div class="modal-glass">
            <div class="modal-header">
                <span id="nomeColunaFiltro" style="font-weight: bold; text-transform: uppercase;">Filtrar</span>
                <i class="fas fa-times" style="cursor:pointer" onclick="fecharModais()"></i>
            </div>
            <div class="modal-body">
                <div style="display: flex; gap: 8px; margin-bottom: 12px;">
                    <button onclick="marcarTodosFiltro(true)" class="btn-page" style="flex:1">Marcar Todos</button>
                    <button onclick="marcarTodosFiltro(false)" class="btn-page" style="flex:1">Desmarcar</button>
                </div>
                
                <div id="opcoesFiltro" style="max-height: 300px; overflow-y: auto; border: 1px solid #eee; padding: 10px; border-radius: 8px;"></div>

                <div style="display: flex; gap: 10px; margin-top: 15px;">
                    <button onclick="fecharModais()" class="btn-page" style="flex:1">Cancelar</button>
                    <button onclick="aplicarFiltroColuna()" class="btn-logout" style="flex:2; background: #2e7d32;">Aplicar Filtro</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL DETALHES -->
    <div id="modalComposicao" class="modal-overlay">
        <div class="modal-glass">
            <div class="modal-header">
                <h2 id="tituloComp" style="margin:0; font-size:1.2rem;">Detalhes do Agendamento</h2>
                <i class="fas fa-times" style="cursor:pointer" onclick="fecharModais()"></i>
            </div>
            <div class="modal-body" id="detalhesItens"></div>
        </div>
    </div>

    <script>
        function toggleDropdownExport() {
            const menu = document.getElementById('menuExport');
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
        }
        window.onclick = function(event) {
            if (!event.target.closest('.dropdown')) {
                const menu = document.getElementById('menuExport');
                if(menu) menu.style.display = 'none';
            }
        }
    </script>

    <script type="module" src="js/monitoramento.js"></script>
</body>
</html>
