<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Agendamento | Móveis Simonetti</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    
    <!-- Bibliotecas de Exportação -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/exceljs@4.3.0/dist/exceljs.min.js"></script>

    <style>
        :root {
            --primary: #D32F2F;
            --primary-dark: #B71C1C;
            --bg-light: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-muted: #666666;
            --border-color: #e0e0e0;
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
        }

        body { font-family: 'Roboto', sans-serif; background-color: var(--bg-light); margin: 0; color: var(--text-main); }

        /* HEADER */
        .header-portal { background: #fff; padding: 10px 20px; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 1000; }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .header-center { text-align: center; }
        .header-right { text-align: right; }
        .titulo-sistema { color: var(--primary); font-weight: bold; font-size: 1.4rem; margin: 0; }

        /* TABELA E FILTROS */
        .main-container { padding: 20px; }
        .table-container { background: white; border-radius: 12px; box-shadow: var(--shadow); overflow: hidden; }
        .scroll-area { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 1100px; }
        
        thead th { background: var(--primary); color: white; padding: 10px; font-size: 11px; text-transform: uppercase; text-align: center; }

        /* BOTÃO DE FILTRO NO HEAD */
        .btn-filtro-head {
            background: transparent; border: none; color: white; font-weight: bold; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; width: 100%;
        }
        .btn-filtro-head span {
            font-size: 9px; margin-top: 4px; padding: 2px 6px; border-radius: 4px;
            background: rgba(255,255,255,0.2); transition: 0.3s;
        }
        .btn-filtro-head span.aplicado { background: #FFEB3B; color: #000; font-weight: bold; }

        tbody td { padding: 12px 10px; text-align: center; border-bottom: 1px solid #eee; font-size: 13px; }

        /* CONTROLES SUPERIORES */
        .control-panel { display: flex; justify-content: space-between; margin-bottom: 20px; background: white; padding: 15px; border-radius: 12px; box-shadow: var(--shadow); align-items: center; }
        .btn-share { background: #1565c0; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; display: flex; gap: 8px; }

        /* MODAL GLASSMORPISM */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(5px); z-index: 2000; justify-content: center; align-items: center; }
        .modal-glass { background: white; width: 90%; max-width: 500px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); overflow: hidden; }
        .modal-header { background: var(--primary); color: white; padding: 15px; display: flex; justify-content: space-between; }
        .modal-body { padding: 20px; max-height: 400px; overflow-y: auto; }

        /* EXPORT DROPDOWN */
        .dropdown { position: relative; }
        .dropdown-content { display: none; position: absolute; right: 0; background: white; min-width: 200px; box-shadow: var(--shadow); border-radius: 8px; z-index: 1001; }
        .dropdown-content a { padding: 12px; text-decoration: none; display: flex; align-items: center; gap: 10px; color: #333; font-size: 13px; border-bottom: 1px solid #f4f4f4; }
    </style>
</head>
<body>

    <header class="header-portal">
        <div class="header-left">
            <i class="fas fa-arrow-left btn-back" onclick="window.history.back()"></i>
            <span style="font-size: 14px; font-weight: bold;">Olá, <span id="txtUser">...</span></span>
        </div>
        <div class="header-center"><h1 class="titulo-sistema">MONITORAMENTO - MÓVEIS SIMONETTI</h1></div>
        <div class="header-right"><button class="btn-logout" onclick="window.location.href='index.html'">Sair</button></div>
    </header>

    <div class="main-container">
        <div class="control-panel">
            <div style="display: flex; gap: 15px;">
                <input type="text" id="inputBusca" placeholder="Pesquisar..." class="control-input" oninput="atualizarFiltros()" style="padding: 10px; border-radius: 6px; border: 1px solid #ddd; width: 250px;">
            </div>

            <div class="dropdown">
                <button onclick="toggleDropdownExport()" class="btn-share"><i class="fas fa-share-alt"></i> EXPORTAR</button>
                <div id="menuExport" class="dropdown-content">
                    <a href="#" onclick="acaoExportar('excel', 'basico')"><i class="fas fa-file-excel" style="color: #2e7d32;"></i> Excel Básico</a>
                    <a href="#" onclick="acaoExportar('excel', 'completo')"><i class="fas fa-file-excel" style="color: #1b5e20;"></i> Excel Completo</a>
                    <a href="#" onclick="acaoExportar('pdf', 'basico')"><i class="fas fa-file-pdf" style="color: #1565c0;"></i> PDF Básico</a>
                    <a href="#" onclick="acaoExportar('pdf', 'completo')"><i class="fas fa-file-pdf" style="color: #d32f2f;"></i> PDF Completo</a>
                </div>
            </div>
        </div>

        <div class="table-container">
            <div class="scroll-area">
                <table id="tabelaDados">
                    <thead>
                        <tr>
                            <th width="40"><input type="checkbox" id="checkAll" onclick="marcarTodos(this)"></th>
                            <th><button class="btn-filtro-head" onclick="abrirModalFiltro('senhaAgendamento')">Senha <span id="label-senhaAgendamento">FILTRO</span></button></th>
                            <th><button class="btn-filtro-head" onclick="abrirModalFiltro('data')">Data <span id="label-data">FILTRO</span></button></th>
                            <th><button class="btn-filtro-head" onclick="abrirModalFiltro('central')">Central <span id="label-central">FILTRO</span></button></th>
                            <th><button class="btn-filtro-head" onclick="abrirModalFiltro('cargas')">Cargas <span id="label-cargas">FILTRO</span></button></th>
                            <th><button class="btn-filtro-head" onclick="abrirModalFiltro('fornecedor')">Fornecedor <span id="label-fornecedor">FILTRO</span></button></th>
                            <th><button class="btn-filtro-head" onclick="abrirModalFiltro('tipoProduto')">Tipo <span id="label-tipoProduto">FILTRO</span></button></th>
                            <th>Linha</th>
                            <th>Ver</th>
                        </tr>
                    </thead>
                    <tbody id="corpoTabela"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- MODAL FILTRO -->
    <div id="modalFiltro" class="modal-overlay">
        <div class="modal-glass">
            <div class="modal-header"><span id="tituloFiltro">Filtrar</span><i class="fas fa-times" onclick="fecharModais()" style="cursor:pointer"></i></div>
            <div class="modal-body">
                <div style="margin-bottom: 10px; display: flex; gap: 8px;">
                    <button onclick="selecionarTodosNoFiltro(true)" style="padding: 5px 10px;">Todos</button>
                    <button onclick="selecionarTodosNoFiltro(false)" style="padding: 5px 10px;">Nenhum</button>
                </div>
                <div id="opcoesFiltro"></div>
            </div>
            <div style="padding: 15px; text-align: right; border-top: 1px solid #eee;">
                <button onclick="fecharModais()" style="margin-right: 10px;">Cancelar</button>
                <button onclick="aplicarFiltroColuna()" class="btn-logout" style="background: green;">Aplicar</button>
            </div>
        </div>
    </div>

    <!-- MODAL COMPOSIÇÃO -->
    <div id="modalComposicao" class="modal-overlay">
        <div class="modal-glass" style="max-width: 700px;">
            <div class="modal-header"><span id="tituloComp">Carga</span><i class="fas fa-times" onclick="fecharModais()" style="cursor:pointer"></i></div>
            <div class="modal-body" id="detalhesItens"></div>
        </div>
    </div>

    <script>
        function toggleDropdownExport() {
            const menu = document.getElementById('menuExport');
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
        }
        window.onclick = e => { if (!e.target.closest('.dropdown')) document.getElementById('menuExport').style.display = 'none'; }
    </script>

    <script type="module" src="js/monitoramento.js"></script>
</body>
</html>
