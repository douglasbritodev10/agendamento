<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub de Operações - Móveis Simonetti</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/exceljs/dist/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root { --primary: #C00000; --dark: #333; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7f6; }
        
        .navbar { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 30px; background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px); border-bottom: 3px solid var(--primary);
            position: sticky; top: 0; z-index: 1000;
        }

        .user-info { display: flex; align-items: center; gap: 10px; font-weight: bold; }
        .btn-sair { background: var(--primary); color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }

        .container { padding: 20px; }
        .acoes-topo { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; }
        
        table { width: 100%; border-collapse: collapse; background: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        th { background: #f8f9fa; padding: 12px; font-size: 11px; border-bottom: 2px solid #ddd; text-transform: uppercase; }
        td { padding: 10px; border-bottom: 1px solid #eee; text-align: center; font-size: 13px; }
        
        .btn-filter { display: block; margin: 5px auto 0; font-size: 10px; padding: 2px 5px; cursor: pointer; border-radius: 3px; border: 1px solid #ccc; }
        .btn-filter.ativo { background: #fff176; font-weight: bold; border-color: #fbc02d; }

        /* Modais */
        .modal-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 8px; width: 450px; max-height: 85vh; overflow-y: auto; }
        .option-disabled { opacity: 0.3; pointer-events: none; background: #f0f0f0; }

        .btn-export-pdf { background: #e74c3c; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-export-excel { background: #27ae60; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="user-info">
            <i class="fas fa-user-circle fa-lg" style="color: var(--primary);"></i>
            <span id="txtUser">...</span>
        </div>
        <h2 style="margin:0; color: var(--primary); font-size: 18px;">OPERACIONAL: RECEBIMENTO DO DIA</h2>
        <button class="btn-sair" onclick="logout()"><i class="fas fa-sign-out-alt"></i> SAIR</button>
    </nav>

    <div class="container">
        <div class="acoes-topo">
            <input type="text" id="inputBusca" placeholder="Buscar por Senha, Fornecedor ou Carga..." onkeyup="atualizarFiltros()" style="flex:1; padding: 10px; border-radius: 5px; border: 1px solid #ccc;">
            <button class="btn-export-excel" onclick="exportarExcel()"><i class="fas fa-file-excel"></i> EXCEL</button>
            <button class="btn-export-pdf" onclick="exportarPDF()"><i class="fas fa-file-pdf"></i> PDF</button>
        </div>

        <table id="mainTable">
            <thead>
                <tr>
                    <th>SENHA / VEÍCULO <button class="btn-filter" id="btn-filter-senhaAgendamento" onclick="abrirFiltro('senhaAgendamento')">FILTRO</button></th>
                    <th>DATA <button class="btn-filter" id="btn-filter-data" onclick="abrirFiltro('data')">FILTRO</button></th>
                    <th>CENTRAL <button class="btn-filter" id="btn-filter-central" onclick="abrirFiltro('central')">FILTRO</button></th>
                    <th>CARGAS <button class="btn-filter" id="btn-filter-cargas" onclick="abrirFiltro('cargas')">FILTRO</button></th>
                    <th>SITUAÇÃO <button class="btn-filter" id="btn-filter-situacao" onclick="abrirFiltro('situacao')">FILTRO</button></th>
                    <th>FORNECEDOR <button class="btn-filter" id="btn-filter-fornecedor" onclick="abrirFiltro('fornecedor')">FILTRO</button></th>
                    <th>TIPO <button class="btn-filter" id="btn-filter-tipoProduto" onclick="abrirFiltro('tipoProduto')">FILTRO</button></th>
                    <th>BOX</th>
                    <th>COMPOSIÇÃO</th>
                </tr>
            </thead>
            <tbody id="corpoTabela"></tbody>
        </table>
    </div>

    <script type="module" src="js/recebimento-do-dia.js"></script>
</body>
</html>
