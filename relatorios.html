<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico e Auditoria | Móveis Simonetti</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .filtros-historico {
            background: white;
            padding: 20px;
            border-radius: 12px;
            display: flex;
            gap: 20px;
            align-items: flex-end;
            margin-bottom: 25px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .campo-data { display: flex; flex-direction: column; gap: 5px; }
        .campo-data label { font-size: 0.75rem; font-weight: bold; color: #D32F2F; }
        .btn-filtrar { background: #212121; color: white; padding: 10px 25px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; height: 42px; }
        .btn-filtrar:hover { background: #444; }
        
        .tabela-historico { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .badge-acao { font-size: 0.7rem; padding: 3px 8px; border-radius: 4px; font-weight: bold; background: #f5f5f5; color: #666; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">MÓVEIS <span>SIMONETTI</span></div>
        <a href="inicial.html" style="color:white; text-decoration:none; font-weight:bold;">⬅ VOLTAR AO PAINEL</a>
    </nav>

    <main class="container">
        <header style="margin-bottom: 25px;">
            <h1>📊 Histórico de Atividades</h1>
            <p>Auditoria completa de ações realizadas por usuários no sistema.</p>
        </header>

        <section class="filtros-historico">
            <div class="campo-data">
                <label>DE:</label>
                <input type="date" id="dataInicio">
            </div>
            <div class="campo-data">
                <label>ATÉ:</label>
                <input type="date" id="dataFim">
            </div>
            <button class="btn-filtrar" id="btnFiltrar">FILTRAR PERÍODO</button>
            <button class="btn-primary" onclick="window.print()" style="height: 42px;">🖨️ IMPRIMIR PDF</button>
        </section>

        <div class="tabela-historico">
            <table>
                <thead>
                    <tr>
                        <th>Data/Hora</th>
                        <th>Usuário</th>
                        <th>Ação Realizada</th>
                        <th>Senha Ref.</th>
                    </tr>
                </thead>
                <tbody id="corpoHistorico">
                    <tr><td colspan="4" style="text-align:center;">Carregando atividades...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <script type="module" src="js/relatorios.js"></script>
</body>
</html>
