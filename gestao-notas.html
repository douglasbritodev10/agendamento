<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monitoramento de Notas | Móveis Simonetti</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    
    <!-- Bibliotecas de Exportação -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>

<style>
    :root {
        --primary: #D32F2F;
        --primary-dark: #B71C1C;
        --bg-light: #f4f7f6;
        --card-bg: #ffffff;
        --text-main: #333333;
        --text-muted: #666666;
        --border-color: #e0e0e0;
        --shadow: 0 4px 12px rgba(0,0,0,0.08);
    }

    /* GERAL */
    * { box-sizing: border-box; }
    body { 
        font-family: 'Roboto', sans-serif; 
        background-color: var(--bg-light); 
        margin: 0; 
        color: var(--text-main); 
        line-height: 1.6;
    }

    /* Estilos de Cores por Tipo na Tabela */
    .tipo-amarelo { background-color: #FFFF00 !important; color: #000; font-weight: bold; border-radius: 4px; padding: 2px 6px; display: inline-block; }
    .tipo-verde { background-color: #4CAF50 !important; color: #fff; font-weight: bold; border-radius: 4px; padding: 2px 6px; display: inline-block; }
    .tipo-azul { background-color: #00BFFF !important; color: #fff; font-weight: bold; border-radius: 4px; padding: 2px 6px; display: inline-block; }
    .tipo-padrao { background-color: #f5f5f5; color: #424242; border-radius: 4px; padding: 2px 6px; display: inline-block; }
    
    /* HEADER */
    .header-portal {
        background: #fff;
        padding: 10px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        position: sticky;
        top: 0;
        z-index: 1000;
    }

    .titulo-sistema { 
        color: var(--primary); 
        font-weight: bold; 
        font-size: 1.2rem; 
        margin: 0; 
        text-transform: uppercase;
    }

    .btn-logout { 
        background: var(--primary); 
        border: none; 
        color: white; 
        padding: 6px 15px; 
        border-radius: 6px; 
        cursor: pointer; 
        font-weight: bold;
        transition: 0.3s;
    }

    /* CONTAINER PRINCIPAL */
    .main-container { padding: 15px; width: 100%; margin: 0; }

    /* PAINEL DE CONTROLE */
    .control-panel {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        margin-bottom: 15px;
        background: white;
        padding: 15px;
        border-radius: 12px 12px 0 0;
        box-shadow: var(--shadow);
        gap: 15px;
        flex-wrap: wrap;
    }

    .search-group {
        display: flex;
        gap: 15px;
        align-items: flex-end;
        flex: 1;
    }

    .control-group { 
        display: flex; 
        flex-direction: column; 
        gap: 5px; 
    }

    .control-group label { 
        font-size: 11px; 
        font-weight: bold; 
        color: var(--text-muted); 
        text-transform: uppercase; 
    }

    .control-input { 
        padding: 10px; 
        border-radius: 6px; 
        border: 1px solid var(--border-color); 
        font-size: 14px; 
        outline: none;
    }

    /* BOTÕES À DIREITA */
    .export-actions { 
        display: flex; 
        gap: 10px; 
        align-items: center;
    }

    .btn-share {
        background: #1565c0; 
        color: white; 
        border: none; 
        padding: 10px 18px; 
        border-radius: 6px; 
        font-weight: bold; 
        cursor: pointer; 
        display: flex; 
        align-items: center; 
        gap: 8px; 
        font-size: 12px;
        transition: 0.2s;
        text-transform: uppercase;
    }

    /* TABELA E LINHAS VERTICAIS */
    .table-container { 
        background: white; 
        width: 100%;
        overflow: hidden; 
        box-shadow: var(--shadow);
        border-radius: 0 0 12px 12px;
    }

    .scroll-area { 
        overflow-x: auto; 
        width: 100%;
    }

    table { 
        width: 100%; 
        border-collapse: collapse; 
        min-width: 1100px; 
    }

    thead th {
        background: var(--primary); 
        color: white; 
        padding: 12px 8px; 
        font-size: 11px;
        text-transform: uppercase; 
        text-align: center; 
        /* Linha vertical no cabeçalho */
        border-right: 1px solid rgba(255, 255, 255, 0.15);
    }

    thead th:last-child { border-right: none; }

    tbody td { 
        padding: 10px; 
        text-align: center; 
        border-bottom: 1px solid #eee; 
        /* Linha vertical no corpo */
        border-right: 1px solid #eee; 
        font-size: 13px; 
    }

    tbody td:last-child { border-right: none; }

    /* Efeito Zebrado */
    tbody tr:nth-child(even) { background-color: #fafafa; }
    tbody tr:hover { background-color: #f1f1f1; }

    .th-content { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; }
    .th-content small { background: rgba(255,255,255,0.2); padding: 2px 5px; border-radius: 4px; font-size: 9px; }

    /* RODAPÉ E PAGINAÇÃO */
    .footer-table { 
        display: flex; 
        justify-content: space-between; 
        align-items: center; 
        padding: 15px 20px; 
        background: #fff; 
        border-top: 1px solid #eee;
    }

    #infoPaginacao {
        font-weight: bold;
        color: var(--text-muted);
        font-size: 14px;
    }

    .pagination-controls {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .btn-pag { 
        padding: 8px 15px; 
        border: 1px solid #ddd; 
        background: white; 
        cursor: pointer; 
        border-radius: 6px; 
        font-size: 13px; 
        font-weight: bold;
        display: flex;
        align-items: center;
        gap: 5px;
    }
    
    .btn-pag:hover:not(:disabled) { background: #f8f9fa; border-color: var(--primary); color: var(--primary); }
    .btn-pag:disabled { opacity: 0.5; cursor: not-allowed; }

    .page-number {
        font-weight: bold;
        background: var(--primary);
        color: white;
        padding: 5px 12px;
        border-radius: 4px;
    }

    /* FILTROS E MODAIS */
    .filter-option-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 5px 0;
        font-size: 13px;
    }

    /* Classe para opções indisponíveis (vincular colunas) */
    .filter-option-disabled {
        color: #bbb;
        font-style: italic;
        text-decoration: line-through;
    }

    /* DROPDOWN */
    .dropdown { position: relative; }
    .dropdown-content {
        display: none; 
        position: absolute; 
        right: 0; 
        background-color: white; 
        min-width: 180px;
        box-shadow: 0px 8px 16px rgba(0,0,0,0.1); 
        z-index: 1001; 
        border-radius: 8px; 
        border: 1px solid #eee;
    }
    .dropdown-content a {
        color: #333; padding: 12px; text-decoration: none; 
        display: flex; align-items: center; gap: 10px; font-size: 12px;
    }

    /* RESPONSIVIDADE */
    @media (max-width: 768px) {
        .control-panel { flex-direction: column; align-items: stretch; }
        .search-group { flex-direction: column; align-items: stretch; }
        .export-actions { justify-content: space-between; }
        .footer-table { flex-direction: column; gap: 15px; text-align: center; }
        .header-portal { flex-direction: column; gap: 10px; }
        .titulo-sistema { font-size: 1rem; }
    }
</style>
</head>
<body>

<header class="header-portal">
<div class="header-left">
    <i class="fas fa-arrow-left btn-back" onclick="window.location.href='inicial.html'" style="cursor:pointer;"></i>
    <span style="font-size: 14px; font-weight: bold;">Olá, <span id="txtUser">USUÁRIO</span></span>
</div>
    <div class="header-center">
        <h1 class="titulo-sistema">Gestão de Ajuste de Notas</h1>
    </div>
    <div class="header-right">
        <button class="btn-logout" onclick="localStorage.removeItem('usuarioLogado'); window.location.href='index.html'">Sair</button>
    </div>
</header>
</header>

    <div class="main-container">
        <!-- PAINEL DE CONTROLE -->
        <div class="control-panel">
            <div class="search-group">
                <div class="control-group">
                    <label>Exibir</label>
                    <select id="selectPageSize" onchange="mudarTamanhoPagina()" class="control-input">
                        <option value="25">25</option>
                        <option value="50" selected>50</option>
                        <option value="75">75</option>
                        <option value="100">100</option>
                    </select>
                </div>
                <div class="control-group" style="flex: 1; max-width: 400px;">
                    <label>Pesquisar Geral</label>
                    <input type="text" id="inputBusca" placeholder="Pesquisar..." class="control-input" style="width: 100%;" oninput="atualizarFiltros()">
                </div>
            </div>

            <div class="export-actions">
                <button onclick="copiarAgendamentosSelecionados()" class="btn-share" style="background:#fb8c00;" title="Copiar para o WhatsApp">
                    <i class="fas fa-copy"></i> COPIAR
                </button>
                
                <div class="dropdown">
                    <button onclick="toggleDropdown()" class="btn-share">
                        <i class="fas fa-share-alt"></i> COMPARTILHAR <i class="fas fa-caret-down"></i>
                    </button>
                    <div id="menuExport" class="dropdown-content">
                        <a href="#" onclick="exportarExcel('basico')"><i class="fas fa-file-excel" style="color: #2e7d32;"></i> EXCEL BÁSICO</a>
                        <a href="#" onclick="exportarExcel('completo')"><i class="fas fa-file-excel" style="color: #1b5e20;"></i> EXCEL COMPLETO</a>
                        <a href="#" onclick="exportarPDF('basico')"><i class="fas fa-file-pdf" style="color: #1565c0;"></i> PDF BÁSICO</a>
                        <a href="#" onclick="exportarPDF('completo')"><i class="fas fa-file-pdf" style="color: #d32f2f;"></i> PDF COMPLETO</a>
                    </div>
                </div>
            </div>
        </div> <!-- FECHAMENTO CORRETO DO CONTROL-PANEL -->

        <!-- TABELA -->
        <div class="table-container">
            <div class="scroll-area">
                <table>
<thead>
    <tr>
        <th width="30"><input type="checkbox" id="checkAll" onclick="marcarTodos(this)"></th>
        
        <th onclick="ordenarTabela('senhaAgendamento', this)">
            <div class="th-content">
                <span>Senha <i class="fas fa-sort"></i></span>
                <small id="filter-senhaAgendamento" class="btn-abrir-filtro" onclick="abrirFiltro('senhaAgendamento', event)">FILTRO</small>
            </div>
        </th>

        <th onclick="ordenarTabela('data', this)">
            <div class="th-content">
                <span>Data <i class="fas fa-sort"></i></span>
                <small id="filter-data" class="btn-abrir-filtro" onclick="abrirFiltro('data', event)">FILTRO</small>
            </div>
        </th>

        <th onclick="ordenarTabela('central', this)">
            <div class="th-content">
                <span>Central <i class="fas fa-sort"></i></span>
                <small id="filter-central" class="btn-abrir-filtro" onclick="abrirFiltro('central', event)">FILTRO</small>
            </div>
        </th>

        <th onclick="ordenarTabela('cargas', this)">
            <div class="th-content">
                <span>Cargas <i class="fas fa-sort"></i></span>
                <small id="filter-cargas" class="btn-abrir-filtro" onclick="abrirFiltro('cargas', event)">FILTRO</small>
            </div>
        </th>

        <th onclick="ordenarTabela('pedido', this)">
            <div class="th-content">
                <span>Pedido <i class="fas fa-sort"></i></span>
                <small id="filter-pedido" class="btn-abrir-filtro" onclick="abrirFiltro('pedido', event)">FILTRO</small>
            </div>
        </th>        
        
        <th>NOTAS</th>

        <th onclick="ordenarTabela('situacao', this)">
            <div class="th-content">
                <span>Situação <i class="fas fa-sort"></i></span>
                <small id="filter-situacao" class="btn-abrir-filtro" onclick="abrirFiltro('situacao', event)">FILTRO</small>
            </div>
        </th>

        <th onclick="ordenarTabela('fornecedor', this)">
            <div class="th-content">
                <span>Fornecedor <i class="fas fa-sort"></i></span>
                <small id="filter-fornecedor" class="btn-abrir-filtro" onclick="abrirFiltro('fornecedor', event)">FILTRO</small>
            </div>
        </th>

        <th onclick="ordenarTabela('tipoProduto', this)">
            <div class="th-content">
                <span>Tipo <i class="fas fa-sort"></i></span>
                <small id="filter-tipoProduto" class="btn-abrir-filtro" onclick="abrirFiltro('tipoProduto', event)">FILTRO</small>
            </div>
        </th>

        <th onclick="ordenarTabela('linhaSeparacao', this)">
            <div class="th-content">
                <span>Linha <i class="fas fa-sort"></i></span>
                <small id="filter-linhaSeparacao" class="btn-abrir-filtro" onclick="abrirFiltro('linhaSeparacao', event)">FILTRO</small>
            </div>
        </th>

        <th width="50">Ações</th>
    </tr>
</thead>
<tbody id="corpoTabela"></tbody>
</table>
</div>

<div class="footer-table">
    <!-- Texto do contador -->
    <span id="infoPaginacao">Mostrando 0 registros (Página 1 de 1)</span>

    <div class="pagination-controls">
        <button onclick="mudarPagina('anterior')" class="btn-pag">
            <i class="fas fa-chevron-left"></i> Anterior
        </button>
        
        <!-- O número da página ativa -->
        <span id="numeroPaginaAtiva" class="page-number">1</span>
        
        <button onclick="mudarPagina('proximo')" class="btn-pag">
            Próximo <i class="fas fa-chevron-right"></i>
        </button>
    </div>
</div>
</div>
</div>

<!-- MODAL DE FILTRO (Versão com controles de seleção rápida) -->
<div id="modalFiltro" class="modal-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:2000; justify-content:center; align-items:center;">
    <div class="modal-glass" style="background:white; padding:20px; border-radius:12px; width:300px; box-shadow: 0 8px 32px rgba(0,0,0,0.3);">
        
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <b id="tituloFiltro" style="color: var(--primary); text-transform: uppercase; font-size: 0.9rem;">Filtro</b>
            <i class="fas fa-times" style="cursor:pointer; color: #666;" onclick="fecharModais()"></i>
        </div>

        <!-- Lista de Opções -->
        <div id="opcoesFiltro" style="max-height:250px; overflow-y:auto; border: 1px solid #eee; padding: 10px; border-radius: 6px; margin-bottom: 10px;"></div>

        <!-- Botões de Seleção Rápida -->
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px;">
            <button onclick="selecionarTudoFiltro(true)" style="padding: 5px; font-size: 0.75rem; cursor: pointer; background: #f0f0f0; border: 1px solid #ccc; border-radius: 4px; font-weight: bold;">MARCAR TODOS</button>
            <button onclick="selecionarTudoFiltro(false)" style="padding: 5px; font-size: 0.75rem; cursor: pointer; background: #f0f0f0; border: 1px solid #ccc; border-radius: 4px; font-weight: bold;">NENHUM</button>
        </div>

        <!-- Botões de Ação Final -->
        <div style="display:flex; gap: 10px;">
            <button onclick="fecharModais()" style="flex:1; padding:10px; background:#e0e0e0; color:#333; border:none; border-radius:6px; font-weight:bold; cursor:pointer;">CANCELAR</button>
            <button onclick="aplicarFiltroColuna()" style="flex:1; padding:10px; background:var(--primary); color:white; border:none; border-radius:6px; font-weight:bold; cursor:pointer;">APLICAR</button>
        </div>
    </div>
</div>

<!-- MODAL COMPOSIÇÃO (O que estava dando erro) -->
<div id="modalComposicao" class="modal-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:2000; justify-content:center; align-items:center;">
    <div class="modal-glass" style="background:white; padding:0; border-radius:12px; width:90%; max-width:800px; overflow:hidden;">
        <div class="modal-header" style="background:#c00000; color:white; padding:15px; display:flex; justify-content:space-between; align-items:center;">
            <h3 id="tituloComp" style="margin:0; font-size:1.2rem;">Composição da Carga</h3>
            <i class="fas fa-times" style="cursor:pointer" onclick="fecharModais()"></i>
        </div>
        <div id="detalhesItens" style="padding:20px;"></div>
    </div>
</div>

    <script>
        function toggleDropdown() {
            const menu = document.getElementById('menuExport');
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
        }
        window.onclick = function(event) {
            if (!event.target.closest('.dropdown')) {
                const menu = document.getElementById('menuExport');
                if(menu) menu.style.display = 'none';
            }
        }
    </script>
    <script type="module" src="js/gestao-notas.js"></script>
</body>
</html>
