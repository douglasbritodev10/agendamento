<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gestão de Notas | Móveis Simonetti</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>

    <style>
        :root {
            --primary: #D32F2F;
            --primary-dark: #B71C1C;
            --bg-light: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-muted: #666666;
            --border-color: #e0e0e0;
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
        }

        body { font-family: 'Roboto', sans-serif; background-color: var(--bg-light); margin: 0; color: var(--text-main); }

        /* HEADER */
        .header-portal { background: #fff; padding: 10px 20px; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 1000; }
        .titulo-sistema { color: var(--primary); font-weight: bold; font-size: 1.4rem; margin: 0; }

        /* TABELA E LAYOUT */
        .main-container { padding: 20px; }
        .table-container { background: white; border-radius: 12px; box-shadow: var(--shadow); overflow: hidden; }
        .scroll-area { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 1300px; }
        
        thead th { background: var(--primary); color: white; padding: 15px 10px; font-size: 11px; text-transform: uppercase; text-align: center; }
        .th-content { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        tbody td { padding: 12px 10px; text-align: center; border-bottom: 1px solid #eee; font-size: 13px; }

        /* SITUAÇÕES (CORES DO PRINT) */
        .sit-ok { background: #066b3c; color: white; }
        .sit-sem-nota { background: #0d47a1; color: white; }
        .sit-reagendada { background: #e1bee7; color: #4a148c; }
        .sit-sobre-ajuste { background: #ffe082; color: #5f4b00; }
        .sit-cancelada { background: #b71c1c; color: white; }
        .sit-oc-pendente { background: #cfd8dc; color: #37474f; }
        .sit-sem-triangulacao { background: #ffcdd2; color: #b71c1c; }
        .sit-vencimento-errado { background: #b71c1c; color: white; outline: 2px solid #ffd600; outline-offset: -2px; }
        .sit-falta-cte { background: #512da8; color: white; }
        .sit-nota-errada { background: #ffccbc; color: #e64a19; }
        .sit-cte-divergente { background: #795548; color: white; }

        .badge-situacao { padding: 6px 12px; border-radius: 15px; font-size: 10px; font-weight: bold; text-transform: uppercase; display: inline-block; }

        /* MODAIS */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 2000; justify-content: center; align-items: center; }
        .modal-glass { background: white; width: 90%; max-width: 450px; border-radius: 15px; overflow: hidden; }
        .modal-header { background: var(--primary); color: white; padding: 15px; display: flex; justify-content: space-between; }
        .modal-body { padding: 20px; }
        
        .control-input { width: 100%; padding: 10px; margin-top: 5px; border-radius: 6px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn-logout { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; }
    </style>
</head>
<body>

    <header class="header-portal">
        <div class="header-left">
            <i class="fas fa-arrow-left" style="cursor:pointer" onclick="window.history.back()"></i>
            <span style="margin-left:15px; font-weight:bold;">Olá, <span id="txtUser">D. BRITO</span></span>
        </div>
        <div class="header-center"><h1 class="titulo-sistema">GESTÃO DE NOTAS E AJUSTES</h1></div>
        <div class="header-right"><button onclick="window.location.href='index.html'" style="background:none; border:none; color:red; cursor:pointer; font-weight:bold;">SAIR</button></div>
    </header>

    <div class="main-container">
        <div class="table-container">
            <div class="scroll-area">
                <table id="tabelaDados">
                    <thead>
                        <tr>
                            <th width="40"><input type="checkbox" id="checkAll"></th>
                            <th onclick="ordenarTabela('senhaAgendamento', this)">
                                <div class="th-content"><span>Senha <i class="fas fa-sort"></i></span><span id="btn-filter-senhaAgendamento" onclick="abrirFiltro('senhaAgendamento', event)" style="cursor:pointer">FILTRO</span></div>
                            </th>
                            <th onclick="ordenarTabela('data', this)">
                                <div class="th-content"><span>Data <i class="fas fa-sort"></i></span><span id="btn-filter-data" onclick="abrirFiltro('data', event)" style="cursor:pointer">FILTRO</span></div>
                            </th>
                            <th onclick="ordenarTabela('fornecedor', this)">
                                <div class="th-content"><span>Fornecedor <i class="fas fa-sort"></i></span><span id="btn-filter-fornecedor" onclick="abrirFiltro('fornecedor', event)" style="cursor:pointer">FILTRO</span></div>
                            </th>
                            <!-- NOVAS COLUNAS -->
                            <th onclick="ordenarTabela('notaFiscal', this)">
                                <div class="th-content"><span>Nº NF <i class="fas fa-sort"></i></span><span id="btn-filter-notaFiscal" onclick="abrirFiltro('notaFiscal', event)" style="cursor:pointer">FILTRO</span></div>
                            </th>
                            <th onclick="ordenarTabela('cte', this)">
                                <div class="th-content"><span>CTe <i class="fas fa-sort"></i></span><span id="btn-filter-cte" onclick="abrirFiltro('cte', event)" style="cursor:pointer">FILTRO</span></div>
                            </th>
                            <th onclick="ordenarTabela('situacao', this)">
                                <div class="th-content"><span>Situação <i class="fas fa-sort"></i></span><span id="btn-filter-situacao" onclick="abrirFiltro('situacao', event)" style="cursor:pointer">FILTRO</span></div>
                            </th>
                            <th width="80">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="corpoTabela"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- MODAL EDIÇÃO -->
    <div id="modalNotas" class="modal-overlay">
        <div class="modal-glass">
            <div class="modal-header">
                <span style="font-weight:bold">ATUALIZAR DADOS</span>
                <i class="fas fa-times" onclick="cancelarEdicao()" style="cursor:pointer"></i>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editIdAgendamento">
                <label>Número da NF</label>
                <input type="text" id="inputNF" class="control-input">
                
                <label style="display:block; margin-top:15px">Número do CTe</label>
                <input type="text" id="inputCTe" class="control-input">

                <label style="display:block; margin-top:15px">Situação do Ajuste</label>
                <select id="selectSituacao" class="control-input">
                    <option value="OK NO AJUSTE">OK NO AJUSTE</option>
                    <option value="SEM NOTA">SEM NOTA</option>
                    <option value="REAGENDADA">REAGENDADA</option>
                    <option value="SOBRE AJUSTE">SOBRE AJUSTE</option>
                    <option value="CANCELADA">CANCELADA</option>
                    <option value="OC PENDENTE">OC PENDENTE</option>
                    <option value="SEM TRIANGULAÇÃO">SEM TRIANGULAÇÃO</option>
                    <option value="VENCIMENTO ERRADO">VENCIMENTO ERRADO</option>
                    <option value="FALTA CTe">FALTA CTe</option>
                    <option value="NOTA ERRADA">NOTA ERRADA</option>
                    <option value="CTe DIVERGENTE">CTe DIVERGENTE</option>
                </select>
                
                <button onclick="salvarDadosNota()" class="btn-logout" style="margin-top:25px; background:#2e7d32">SALVAR ALTERAÇÕES</button>
            </div>
        </div>
    </div>

    <!-- MODAL FILTRO (REAPROVEITADO) -->
    <div id="modalFiltro" class="modal-overlay">
        <div class="modal-glass" style="max-width:350px">
            <div class="modal-header"><span id="nomeColunaFiltro">FILTRAR</span><i class="fas fa-times" onclick="fecharModais()"></i></div>
            <div class="modal-body">
                <div id="opcoesFiltro" style="max-height:250px; overflow-y:auto"></div>
                <button onclick="aplicarFiltroColuna()" class="btn-logout" style="margin-top:15px">APLICAR</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/gestao-notas.js"></script>
</body>
</html>
