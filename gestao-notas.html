<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monitoramento de Notas | Móveis Simonetti</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    
    <!-- Bibliotecas de Exportação -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>

<style>
    :root {
        --primary: #D32F2F;
        --primary-dark: #B71C1C;
        --bg-light: #f4f7f6;
        --card-bg: #ffffff;
        --text-main: #333333;
        --text-muted: #666666;
        --border-color: #e0e0e0;
        --shadow: 0 4px 12px rgba(0,0,0,0.08);
    }

    /* GERAL */
    * { box-sizing: border-box; }
    body { 
        font-family: 'Roboto', sans-serif; 
        background-color: var(--bg-light); 
        margin: 0; 
        color: var(--text-main); 
        line-height: 1.6;
    }

    /* HEADER */
    .header-portal {
        background: #fff;
        padding: 10px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        position: sticky;
        top: 0;
        z-index: 1000;
    }

    .titulo-sistema { 
        color: var(--primary); 
        font-weight: bold; 
        font-size: 1.2rem; 
        margin: 0; 
        text-transform: uppercase;
    }

    .btn-logout { 
        background: var(--primary); 
        border: none; 
        color: white; 
        padding: 6px 15px; 
        border-radius: 6px; 
        cursor: pointer; 
        font-weight: bold;
        transition: 0.3s;
    }

    /* CONTAINER PRINCIPAL */
    .main-container { padding: 15px; width: 100%; margin: 0; }

    /* PAINEL DE CONTROLE - ALINHAMENTO SOLICITADO */
    .control-panel {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        margin-bottom: 15px;
        background: white;
        padding: 15px;
        border-radius: 12px 12px 0 0;
        box-shadow: var(--shadow);
        gap: 15px;
        flex-wrap: wrap;
    }

    .search-group {
        display: flex;
        gap: 15px;
        align-items: flex-end;
        flex: 1;
    }

    .control-group { 
        display: flex; 
        flex-direction: column; 
        gap: 5px; 
    }

    .control-group label { 
        font-size: 11px; 
        font-weight: bold; 
        color: var(--text-muted); 
        text-transform: uppercase; 
    }

    .control-input { 
        padding: 10px; 
        border-radius: 6px; 
        border: 1px solid var(--border-color); 
        font-size: 14px; 
        outline: none;
    }

    /* BOTÕES À DIREITA */
    .export-actions { 
        display: flex; 
        gap: 10px; 
        align-items: center;
    }

    .btn-share {
        background: #1565c0; 
        color: white; 
        border: none; 
        padding: 10px 18px; 
        border-radius: 6px; 
        font-weight: bold; 
        cursor: pointer; 
        display: flex; 
        align-items: center; 
        gap: 8px; 
        font-size: 12px;
        transition: 0.2s;
        text-transform: uppercase;
    }

    /* TABELA OCUPANDO TUDO */
    .table-container { 
        background: white; 
        width: 100%;
        overflow: hidden; 
        box-shadow: var(--shadow);
        border-radius: 0 0 12px 12px;
    }

    .scroll-area { 
        overflow-x: auto; /* Scroll no mobile */
        width: 100%;
    }

    table { 
        width: 100%; 
        border-collapse: collapse; 
        min-width: 1100px; /* Garante que a tabela não esmague as colunas */
    }

    thead th {
        background: var(--primary); 
        color: white; 
        padding: 12px 8px; 
        font-size: 11px;
        text-transform: uppercase; 
        text-align: center; 
    }

    .th-content { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; }
    .th-content small { background: rgba(255,255,255,0.2); padding: 2px 5px; border-radius: 4px; font-size: 9px; }

    tbody td { 
        padding: 10px; 
        text-align: center; 
        border-bottom: 1px solid #eee; 
        font-size: 13px; 
    }

    /* RODAPÉ SOLICITADO */
    .pagination { 
        display: flex; 
        justify-content: space-between; 
        align-items: center; 
        padding: 15px 20px; 
        background: #fff; 
        border-top: 1px solid #eee;
    }

    #infoPagina {
        font-weight: bold;
        color: var(--text-muted);
        font-size: 14px;
    }

    .page-buttons {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .btn-page { 
        padding: 8px 15px; 
        border: 1px solid #ddd; 
        background: white; 
        cursor: pointer; 
        border-radius: 6px; 
        font-size: 13px; 
        font-weight: bold;
        display: flex;
        align-items: center;
        gap: 5px;
    }
    
    .btn-page:hover { background: #f8f9fa; border-color: var(--primary); color: var(--primary); }

    /* DROPDOWN */
    .dropdown { position: relative; }
    .dropdown-content {
        display: none; 
        position: absolute; 
        right: 0; 
        background-color: white; 
        min-width: 180px;
        box-shadow: 0px 8px 16px rgba(0,0,0,0.1); 
        z-index: 1001; 
        border-radius: 8px; 
        border: 1px solid #eee;
    }
    .dropdown-content a {
        color: #333; padding: 12px; text-decoration: none; 
        display: flex; align-items: center; gap: 10px; font-size: 12px;
    }

    /* RESPONSIVIDADE CELULAR */
    @media (max-width: 768px) {
        .control-panel { flex-direction: column; align-items: stretch; }
        .search-group { flex-direction: column; align-items: stretch; }
        .export-actions { justify-content: space-between; }
        .pagination { flex-direction: column; gap: 15px; text-align: center; }
        .header-portal { flex-direction: column; gap: 10px; }
        .titulo-sistema { font-size: 1rem; }
    }
</style>
</head>
<body>

    <header class="header-portal">
        <div class="header-left">
            <i class="fas fa-arrow-left" style="cursor:pointer; font-size: 1.2rem;" onclick="window.history.back()"></i>
            <span style="font-size: 14px; font-weight: bold; margin-left: 10px;">Olá, <span id="txtUser">DBRITO</span></span>
        </div>
        <div class="header-center">
            <h1 class="titulo-sistema">Monitoramento de Notas</h1>
        </div>
        <div class="header-right">
            <button class="btn-logout" onclick="window.location.href='index.html'">Sair</button>
        </div>
    </header>

    <div class="main-container">
        <!-- PAINEL DE CONTROLE -->
        <div class="control-panel">
            <div class="search-group">
                <div class="control-group">
                    <label>Exibir</label>
                    <select id="selectPageSize" onchange="mudarTamanhoPagina()" class="control-input">
                        <option value="25">25</option>
                        <option value="50" selected>50</option>
                        <option value="75">75</option>
                        <option value="100">100</option>
                    </select>
                </div>
                <div class="control-group" style="flex: 1; max-width: 400px;">
                    <label>Pesquisar Geral</label>
                    <input type="text" id="inputBusca" placeholder="Senha, fornecedor, carga..." class="control-input" style="width: 100%;" oninput="atualizarFiltros()">
                </div>
            </div>

            <div class="export-actions">
                <button onclick="copiarAgendamentosSelecionados()" class="btn-share" style="background:#fb8c00;" title="Copiar para o WhatsApp">
                    <i class="fas fa-copy"></i> COPIAR
                </button>
                
                <div class="dropdown">
                    <button onclick="toggleDropdown()" class="btn-share">
                        <i class="fas fa-share-alt"></i> COMPARTILHAR <i class="fas fa-caret-down"></i>
                    </button>
                    <div id="menuExport" class="dropdown-content">
                        <a href="#" onclick="exportarExcel('basico')"><i class="fas fa-file-excel" style="color: #2e7d32;"></i> EXCEL BÁSICO</a>
                        <a href="#" onclick="exportarExcel('completo')"><i class="fas fa-file-excel" style="color: #1b5e20;"></i> EXCEL COMPLETO</a>
                        <a href="#" onclick="exportarPDF('basico')"><i class="fas fa-file-pdf" style="color: #1565c0;"></i> PDF BÁSICO</a>
                        <a href="#" onclick="exportarPDF('completo')"><i class="fas fa-file-pdf" style="color: #d32f2f;"></i> PDF COMPLETO</a>
                    </div>
                </div>
            </div>
        </div> <!-- FECHAMENTO CORRETO DO CONTROL-PANEL -->

        <!-- TABELA -->
        <div class="table-container">
            <div class="scroll-area">
                <table>
                    <thead>
                        <tr>
                            <th width="30"><input type="checkbox" id="checkAll" onclick="marcarTodos(this)"></th>
                            <th onclick="ordenarTabela('senhaAgendamento', this)">
                                <div class="th-content"><span>Senha <i class="fas fa-sort"></i></span><small onclick="abrirFiltro('senhaAgendamento', event)">FILTRO</small></div>
                            </th>
                            <th onclick="ordenarTabela('data', this)">
                                <div class="th-content"><span>Data <i class="fas fa-sort"></i></span><small onclick="abrirFiltro('data', event)">FILTRO</small></div>
                            </th>
                            <th onclick="ordenarTabela('central', this)">
                                <div class="th-content"><span>Central <i class="fas fa-sort"></i></span><small onclick="abrirFiltro('central', event)">FILTRO</small></div>
                            </th>
                            <th onclick="ordenarTabela('cargas', this)">
                                <div class="th-content"><span>Cargas <i class="fas fa-sort"></i></span><small onclick="abrirFiltro('cargas', event)">FILTRO</small></div>
                            </th>
                            <th>NOTAS</th>
                            <th onclick="ordenarTabela('situacao', this)">
                                <div class="th-content"><span>Situação <i class="fas fa-sort"></i></span><small onclick="abrirFiltro('situacao', event)">FILTRO</small></div>
                            </th>
                            <th onclick="ordenarTabela('fornecedor', this)">
                                <div class="th-content"><span>Fornecedor <i class="fas fa-sort"></i></span><small onclick="abrirFiltro('fornecedor', event)">FILTRO</small></div>
                            </th>
                            <th onclick="ordenarTabela('tipoProduto', this)">
                                <div class="th-content"><span>Tipo <i class="fas fa-sort"></i></span><small onclick="abrirFiltro('tipoProduto', event)">FILTRO</small></div>
                            </th>
                            <th onclick="ordenarTabela('linhaSeparacao', this)">
                                <div class="th-content"><span>Linha <i class="fas fa-sort"></i></span><small onclick="abrirFiltro('linhaSeparacao', event)">FILTRO</small></div>
                            </th>
                            <th width="50">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="corpoTabela"></tbody>
                </table>
            </div>

            <!-- RODAPÉ DE PAGINAÇÃO (ÚNICO) -->
            <div class="pagination">
                <div id="infoPagina">Mostrando 0 registros (Página 1 de 1)</div>
                <div class="page-buttons" id="botoesPagina">
                    <button onclick="mudarPagina('anterior')" class="btn-page"><i class="fas fa-chevron-left"></i> Anterior</button>
                    <span id="numeroPaginaAtiva" style="margin: 0 10px; font-weight: bold; color: var(--primary);">1</span>
                    <button onclick="mudarPagina('proximo')" class="btn-page">Próximo <i class="fas fa-chevron-right"></i></button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAIS (Mantenha como estão, eles já funcionam bem) -->
    <div id="modalFiltro" class="modal-overlay">...</div>
    <div id="modalComposicao" class="modal-overlay">...</div>

    <script>
        function toggleDropdown() {
            const menu = document.getElementById('menuExport');
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
        }
        window.onclick = function(event) {
            if (!event.target.closest('.dropdown')) {
                const menu = document.getElementById('menuExport');
                if(menu) menu.style.display = 'none';
            }
        }
    </script>
    <script type="module" src="js/gestao-notas.js"></script>
</body>
</html>
