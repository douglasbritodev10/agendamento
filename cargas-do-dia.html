<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cargas do Dia | Móveis Simonetti</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    
    <style>
        :root { --primary: #D32F2F; --bg-light: #f4f7f6; --border-color: #e0e0e0; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg-light); min-height: 100vh; }

        .navbar { background: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 1000; }
        .container { padding: 20px; max-width: 1600px; margin: auto; }
        
        .dashboard-header { display: flex; gap: 20px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 15px; border-radius: 12px; flex: 1; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; }
        .stat-card span { font-size: 1.8rem; font-weight: bold; color: var(--primary); display: block; }

        .card-tabela { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .table-responsive { overflow-x: auto; max-height: 70vh; }

        /* Ajuste na Tabela para visualização em grade */
        table { 
            width: 100%; 
            border-collapse: collapse; 
            min-width: 1200px; 
            border: 1px solid var(--border-color); 
        }

        th { 
            background: #f8f9fa; 
            padding: 12px; 
            text-align: left; 
            font-size: 0.75rem; 
            color: #333; 
            text-transform: uppercase; 
            border-bottom: 2px solid #ccc; 
            border-right: 1px solid #ddd; 
            position: sticky; 
            top: 0; 
        }

        td { 
            padding: 10px 12px; 
            border-bottom: 1px solid #ddd; 
            border-right: 1px solid #eee;  
            font-size: 0.85rem; 
            color: #333;
            white-space: normal; 
            word-wrap: break-word;
            vertical-align: middle; /* Alinha o conteúdo no meio da célula */
        }

        /* AJUSTE NA SITUAÇÃO PARA NÃO CORTAR TEXTO */
        .select-situacao {
            width: 100%;
            padding: 8px 4px;
            border-radius: 4px;
            border: none;
            font-weight: bold;
            color: white;
            cursor: pointer;
            text-align: center;
            font-size: 0.75rem; /* Diminuído levemente para caber textos longos */
            
            /* Permite que o texto quebre ou seja visualizado melhor */
            white-space: normal; 
            overflow: visible;
            text-overflow: inherit;
            word-wrap: break-word;
            
            /* Ajuste para telas menores/textos longos */
            line-height: 1.2;
            min-height: 35px;
            
            /* Remove a seta padrão para ganhar espaço interno */
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
        }

        /* Coluna de situação um pouco mais larga se necessário */
        th:nth-child(6), td:nth-child(6) {
            min-width: 180px; 
        }

        .btn-puxar { background: #1976D2; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        
        /* Modal */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; }
        .modal-content { background: white; border-radius: 15px; width: 95%; max-width: 500px; max-height: 90vh; display: flex; flex-direction: column; }
        .modal-header { padding: 15px 20px; background: var(--primary); color: white; display: flex; justify-content: space-between; align-items: center; border-radius: 15px 15px 0 0; }
        .modal-body { padding: 20px; overflow-y: auto; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 5px; color: #444; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-left">
            <a href="inicial.html" style="color:var(--primary); margin-right: 15px;"><i class="fas fa-arrow-left"></i></a>
            <span id="userNameDisplay" class="user-info">...</span>
        </div>
        <h2>PAINEL DE CARGAS DO DIA</h2>
        <button onclick="logout()" style="background:none; border:1px solid #ccc; padding:5px 10px; border-radius:5px; cursor:pointer;">Sair</button>
    </nav>

    <main class="container">
        <div class="dashboard-header">
            <div class="stat-card"><h3>Agendas</h3><span id="totalAgendas">0</span></div>
            <div class="stat-card"><h3>Veículos</h3><span id="totalVeiculos">0</span></div>
        </div>

<div class="card-tabela">
    <div style="padding:15px; border-bottom:1px solid #eee; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
        <div style="display: flex; gap: 10px;">
            <button onclick="abrirModalSelecao()" class="btn-puxar"><i class="fas fa-calendar-plus"></i> SELECIONAR AGENDAMENTOS</button>
            <button onclick="removerSelecionados()" class="btn-puxar" style="background: #7a002b;"><i class="fas fa-trash-alt"></i> REMOVER SELECIONADOS</button>
            <button onclick="agruparEmCarga()" class="btn-puxar" style="background: #ff7625;"><i class="fas fa-truck-moving"></i> UNIR EM CARGA</button>
        </div>
        
        <div class="export-tools" style="display: flex; gap: 8px;">
            <button onclick="copiarSelecionados()" class="btn-puxar" style="background:#555;" title="Copiar para WhatsApp/Rascunho"><i class="fas fa-copy"></i> COPIAR</button>
            <button onclick="exportarPDF('simples')" class="btn-puxar" style="background:#d32f2f;" title="Exportar PDF"><i class="fas fa-file-pdf"></i> PDF</button>
            <button onclick="exportarExcel('simples')" class="btn-puxar" style="background:#2e7d32;" title="Exportar Excel"><i class="fas fa-file-excel"></i> EXCEL</button>
        </div>
    </div>

    <div class="table-responsive">
        <table id="tabelaDados">
            <thead>
                <tr>
                    <th style="width: 40px; text-align: center;"><input type="checkbox" id="selectAllPainel" onclick="toggleAllPainel(this.checked)"></th>
                    <th>SENHA</th>
                    <th>DATA</th>
                    <th>CENTRAL</th>
                    <th>CARGAS</th>
                    <th style="width:160px">SITUAÇÃO</th>
                    <th>FORNECEDOR</th>
                    <th>TIPO</th>
                    <th>BOX</th>
                    <th>AÇÕES</th>
                </tr>
            </thead>
            <tbody id="tabelaCargas"></tbody>
        </table>
    </div>
</div>
    </main>

    <div id="modalSelecao" class="modal">
        <div class="modal-content" style="max-width: 1300px;">
            <div class="modal-header">
                <h3><i class="fas fa-search"></i> Buscar Agendamentos</h3>
                <i class="fas fa-times" style="cursor:pointer" onclick="fecharModais()"></i>
            </div>
            <div class="modal-body">
                <div class="filter-bar" style="display: flex; gap: 15px; margin-bottom: 15px; background: #f9f9f9; padding: 12px; border-radius: 8px; align-items: center;">
                    <input type="date" id="filtroDataModal" onchange="filtrarModal()">
                    <input type="text" id="buscaTextoModal" onkeyup="filtrarModal()" placeholder="Senha ou Fornecedor..." style="flex:1; padding:8px;">
                    <button onclick="puxarSelecionados()" class="btn-puxar" style="background:#2e7d32;">ADICIONAR</button>
                </div>
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th><input type="checkbox" id="selectAll" onclick="toggleAllModal()"></th>
                                <th>SENHA</th>
                                <th>DATA</th>
                                <th>CARGAS</th>
                                <th>SITUAÇÃO</th>
                                <th>FORNECEDOR</th>
                                <th>TIPO</th>
                            </tr>
                        </thead>
                        <tbody id="corpoBuscaModal"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="modalAcerto" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-truck-loading"></i> Acerto de Descarga</h3>
                <i class="fas fa-times" style="cursor:pointer" onclick="fecharModais()"></i>
            </div>
            <div class="modal-body">
                <input type="hidden" id="idAgendamentoAcerto">
                <input type="hidden" id="senhaAgendamentoAcerto">
                
                <div class="form-group">
                    <label>Equipe / Cooperados:</label>
                    <div style="background: #f9f9f9; padding: 10px; border-radius: 6px; border: 1px solid #ccc; max-height: 250px; overflow-y: auto;">
        
                        <div style="border-bottom: 2px solid #ddd; margin-bottom: 10px; padding-bottom: 8px; text-align: left;">
                            <label style="cursor:pointer; font-weight:bold; color: #1976D2; display: flex; align-items: center; gap: 10px;">
                                <input type="checkbox" id="checkTodosCooperados" onclick="toggleTodosCooperados(this.checked)" style="width: 18px; height: 18px;"> 
                                SELECIONAR TODOS
                            </label>
                        </div>

                        <div id="listaCheckCooperados" style="display: flex; flex-direction: column; gap: 5px;">
                            </div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Valor da Descarga (R$):</label>
                    <input type="number" id="valorDescarga" placeholder="0.00" step="0.01">
                </div>

                <button onclick="salvarAcerto()" class="btn-puxar" style="width:100%; justify-content:center; background:#2e7d32; margin-top:10px;">
                    <i class="fas fa-save"></i> SALVAR ACERTO
                </button>
            </div>
        </div>
    </div>

    <script type="module" src="js/cargas-do-dia.js"></script>
</body>
</html>
