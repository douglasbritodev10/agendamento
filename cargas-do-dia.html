<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cargas do Dia | Móveis Simonetti</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #D32F2F;
            --bg-light: #f4f7f6;
            --card-bg: #ffffff;
            --border-color: #e0e0e0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--bg-light); min-height: 100vh; }

        /* NAVBAR PADRÃO */
        .navbar {
            background: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .nav-left { display: flex; align-items: center; gap: 15px; flex: 1; }
        .nav-center { flex: 2; text-align: center; }
        .nav-right { flex: 1; text-align: right; }
        .btn-back { color: var(--primary); font-size: 1.2rem; text-decoration: none; }
        .user-info { font-weight: bold; color: #555; font-size: 0.85rem; text-transform: uppercase; }
        .nav-center h2 { font-size: 1.1rem; color: #444; margin: 0; }
        .btn-logout { background: var(--primary); color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; }

        .container { padding: 20px; max-width: 1400px; margin: auto; }
        
        /* DASHBOARD */
        .dashboard-header { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
        .stat-card { background: white; padding: 15px; border-radius: 12px; flex: 1; min-width: 180px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; }
        .stat-card span { font-size: 1.8rem; font-weight: bold; color: var(--primary); display: block; }
        .chart-container { background: white; padding: 10px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); width: 300px; height: 120px; }

        /* TABELA */
        .card-tabela { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 1100px; }
        th { background: #f8f9fa; padding: 12px; text-align: left; font-size: 0.7rem; color: #888; text-transform: uppercase; border-bottom: 2px solid #eee; }
        td { padding: 10px 12px; border-bottom: 1px solid #eee; font-size: 0.85rem; }

        .status-select { padding: 6px; border-radius: 6px; border: none; font-weight: bold; font-size: 0.7rem; width: 100%; cursor: pointer; color: white; }
        .badge-tipo { padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 0.75rem; color: #333; }

        /* MODAL DESCARGA */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; width: 90%; max-width: 450px; }
        .list-coop { max-height: 150px; overflow-y: auto; border: 1px solid #eee; padding: 10px; margin: 10px 0; border-radius: 8px; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-left">
            <a href="inicial.html" class="btn-back"><i class="fas fa-arrow-left"></i></a>
            <span id="userNameDisplay" class="user-info">...</span>
        </div>
        <div class="nav-center"><h2>CARGAS DO DIA</h2></div>
        <div class="nav-right"><button onclick="logout()" class="btn-logout">SAIR</button></div>
    </nav>

    <main class="container">
        <div class="dashboard-header">
            <div class="stat-card"><h3>Agendas</h3><span id="totalAgendas">0</span></div>
            <div class="stat-card"><h3>Veículos</h3><span id="totalVeiculos">0</span></div>
            <div class="chart-container"><canvas id="statusChart"></canvas></div>
        </div>

        <div class="card-tabela">
            <div style="padding:15px; border-bottom:1px solid #eee;">
                <button id="btnVincular" onclick="vincularAgendas()" style="background:#1976D2; color:white; border:none; padding:8px 15px; border-radius:6px; cursor:pointer; font-weight:bold; display:none;">
                    <i class="fas fa-link"></i> VINCULAR VEÍCULO (EM MASSA)
                </button>
            </div>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th><input type="checkbox" id="selectAll" onclick="toggleAll()"></th>
                            <th>SENHA</th>
                            <th>DATA</th>
                            <th>CARGAS</th>
                            <th>SITUAÇÃO</th>
                            <th>TIPO</th>
                            <th>FORNECEDOR</th>
                            <th>BOX</th>
                            <th>AÇÕES</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaCargas"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="modalDescarga" class="modal">
        <div class="modal-content">
            <h3 style="color:var(--primary); margin-bottom:15px;">Vincular Descarga</h3>
            <label style="font-size:0.7rem; font-weight:bold;">SELECIONE OS COOPERADOS:</label>
            <div id="listaCooperados" class="list-coop"></div>
            
            <label style="font-size:0.7rem; font-weight:bold;">VALOR DA DESCARGA (R$):</label>
            <input type="number" id="valorDescarga" style="width:100%; padding:10px; margin-bottom:20px; border:1px solid #ddd; border-radius:8px;">
            
            <div style="display:flex; gap:10px;">
                <button onclick="salvarDescarga()" style="flex:1; background:#2e7d32; color:white; border:none; padding:12px; border-radius:8px; font-weight:bold;">SALVAR</button>
                <button onclick="fecharModal()" style="flex:1; background:#eee; padding:12px; border-radius:8px; border:none;">CANCELAR</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/cargas-do-dia.js"></script>
</body>
</html>
