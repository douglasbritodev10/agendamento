<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurar Perfil | Móveis Simonetti</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body {
            background: #212121;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .setup-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        h2 { color: white; font-weight: 300; margin-bottom: 10px; }
        h2 span { color: #D32F2F; font-weight: bold; }
        p { color: #aaa; font-size: 0.9rem; margin-bottom: 25px; }
        
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { color: #D32F2F; font-size: 0.8rem; font-weight: bold; margin-left: 5px; }
        
        input {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            outline: none;
            margin-top: 5px;
        }
        input:focus { border-color: #D32F2F; }
        
        button {
            width: 100%;
            padding: 15px;
            background: #D32F2F;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }
        button:hover { background: #B71C1C; }
    </style>
</head>
<body>

    <div class="setup-card">
        <h2>Olá! Vamos <span>Começar</span></h2>
        <p>Configure seu perfil de acesso ao sistema</p>
        
        <div class="form-group">
            <label>NOME COMPLETO</label>
            <input type="text" id="novoNome" placeholder="Ex: Douglas Brito">
        </div>

        <div class="form-group">
            <label>NOME DE USUÁRIO (LOGIN)</label>
            <input type="text" id="novoUsername" placeholder="Ex: DBRITO" style="text-transform: uppercase;">
        </div>

        <div class="form-group">
            <label>NOVA SENHA</label>
            <input type="password" id="novaSenha" placeholder="Mínimo 6 caracteres">
        </div>

        <div class="form-group">
            <label>CONFIRME A SENHA</label>
            <input type="password" id="confirmaSenha" placeholder="Repita a senha">
        </div>
        
        <button id="btnFinalizar">FINALIZAR E ENTRAR</button>
    </div>

    <script type="module" src="js/primeiro-acesso.js"></script>
</body>
</html>
