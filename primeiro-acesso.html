<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurar Perfil | Móveis Simonetti</title>
    <style>
        :root {
            --primary: #D32F2F;
            --bg-light: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-muted: #666666;
            --border-color: #e0e0e0;
        }

        body {
            background: var(--bg-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        .setup-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        h2 { 
            color: #555; 
            font-weight: 300; 
            margin-bottom: 10px; 
            font-size: 1.8rem;
        }
        
        h2 span { 
            color: var(--primary); 
            font-weight: bold; 
        }

        p { 
            color: var(--text-muted); 
            font-size: 1rem; 
            margin-bottom: 30px; 
        }
        
        .form-group { 
            margin-bottom: 20px; 
            text-align: left; 
        }

        .form-group label { 
            color: var(--primary); 
            font-size: 0.75rem; 
            font-weight: bold; 
            margin-left: 5px;
            letter-spacing: 0.5px;
        }
        
        input {
            width: 100%;
            padding: 14px;
            background: #fafafa;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            margin-top: 6px;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        input:focus { 
            border-color: var(--primary); 
            background: #fff;
            box-shadow: 0 0 0 4px rgba(211, 47, 47, 0.1);
        }

        input::placeholder {
            color: #bbb;
            font-size: 0.9rem;
        }
        
        button {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 25px;
            transition: all 0.3s ease;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        button:hover { 
            background: #B71C1C; 
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(211, 47, 47, 0.3);
        }

        button:active { 
            transform: translateY(0); 
        }

        /* Estilo para o campo de Username */
        #novoUsername {
            font-weight: 600;
            letter-spacing: 1px;
            color: #444;
        }
    </style>
</head>
<body>

    <div class="setup-card">
        <h2>Olá! Vamos <span>Começar</span></h2>
        <p>Configure seu perfil de acesso ao sistema</p>
        
        <div class="form-group">
            <label>NOME COMPLETO</label>
            <input type="text" id="novoNome" placeholder="Ex: Douglas Brito">
        </div>

        <div class="form-group">
            <label>NOME DE USUÁRIO (LOGIN)</label>
            <input type="text" id="novoUsername" placeholder="Ex: DBRITO" style="text-transform: uppercase;">
        </div>

        <div class="form-group">
            <label>NOVA SENHA</label>
            <input type="password" id="novaSenha" placeholder="Mínimo 6 caracteres">
        </div>

        <div class="form-group">
            <label>CONFIRME A SENHA</label>
            <input type="password" id="confirmaSenha" placeholder="Repita a senha">
        </div>
        
        <button id="btnFinalizar">Finalizar e Entrar</button>
    </div>

    <script type="module" src="js/primeiro-acesso.js"></script>
</body>
</html>
