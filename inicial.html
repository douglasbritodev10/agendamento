<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Logístico | Móveis Simonetti</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #D32F2F;
            --bg-dark: #1a1a1a; /* Um tom levemente mais escuro para profundidade */
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navbar */
        .navbar {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
        }

        .logo { font-size: 1.3rem; font-weight: 300; letter-spacing: 1px; }
        .logo span { color: var(--primary); font-weight: bold; }

        .user-info { display: flex; align-items: center; gap: 15px; color: #aaa; font-size: 0.9rem; }
        .btn-sair {
            background: transparent;
            color: #ff5252;
            border: 1px solid rgba(211, 47, 47, 0.3);
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-sair:hover { background: var(--primary); color: white; }

        /* Main Content */
        .container {
            max-width: 1100px;
            margin: 60px auto;
            padding: 0 20px;
            width: 100%;
            box-sizing: border-box;
        }

        header { text-align: center; margin-bottom: 50px; }
        header h2 { font-size: 2rem; font-weight: 300; margin-bottom: 10px; }
        header b { color: var(--primary); }
        header p { color: #888; margin: 0; }

        /* Grid de Navegação */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 25px;
        }

        .nav-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            padding: 45px 25px;
            border-radius: 24px;
            text-align: center;
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .nav-card i { 
            font-size: 2.8rem; 
            margin-bottom: 20px; 
            color: var(--primary);
            transition: 0.3s;
        }

        .nav-card h3 { 
            margin: 0 0 10px 0; 
            font-size: 1.2rem; 
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .nav-card p { 
            margin: 0; 
            font-size: 0.85rem; 
            color: #888;
            line-height: 1.4;
        }

        /* Hover Effects */
        .nav-card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .nav-card:hover i {
            transform: scale(1.1);
            color: #ff5252;
        }

        @media (max-width: 600px) {
            .navbar { padding: 15px 20px; }
            .user-info span { display: none; }
            .container { margin: 30px auto; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">MÓVEIS <span>SIMONETTI</span></div>
        
        <div class="user-info">
            <i class="fas fa-user-circle"></i>
            <span id="user-display">---</span>
            <button id="btnSair" class="btn-sair"><i class="fas fa-power-off"></i></button>
        </div>
    </nav>

    <main class="container">
        <header>
            <h2>Portal <b>Logístico</b></h2>
            <p id="data-atual"></p>
        </header>

        <div class="dashboard-grid">
            <a href="agendamento.html" class="nav-card">
                <i class="fas fa-calendar-check"></i>
                <h3>Agendamentos</h3>
                <p>Gestão e criação de novas Agendas</p>
            </a>

            <a href="monitoramento.html" class="nav-card">
                <i class="fas fa-list-ul"></i>
                <h3>Relatório</h3>
                <p>Consultar Agendamentos</p>
            </a>

            <a href="ajustes.html" class="nav-card">
                <i class="fas fa-tools"></i>
                <h3>Ajustes das Cargas</h3>
                <p>Situação e Pendências</p>
            </a>

            <a href="relatorios.html" class="nav-card">
                <i class="fas fa-file-contract"></i>
                <h3>possivelmente cargas do dia</h3>
                <p>Situação das cargas no CD</p>
            </a>

            <a href="usuarios.html" id="cardAdmin" class="nav-card" style="display:none;">
                <i class="fas fa-user-lock"></i>
                <h3>Administração</h3>
                <p>Controle de usuários e acessos</p>
            </a>
        </div>
    </main>

    <script type="module" src="js/main.js"></script>
</body>
</html>
